							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-failure">
								<section id="t13ne-t13tx-192" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-failure-text-section t13ne-textbox" title="Failure">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-failure-text-section-header t13ne-textbox-title">
									Failure</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-failure-text-section-footer t13ne-textbox-type">
									Zealous</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-failure-text-section-main t13ne-textbox-description">
									Zealous failures indicate that whatever has gone wrong is an example of things getting out of hand. Sometimes the Zealous failure indicates that you have succeeded too well, other times that in your haste, you have lost control of the situation.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-hitch">
								<section id="t13ne-t13tx-193" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-hitch-text-section t13ne-textbox" title="Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-hitch-text-section-header t13ne-textbox-title">
									Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-hitch-text-section-footer t13ne-textbox-type">
									Doubt</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-hitch-text-section-main t13ne-textbox-description">
									Doubt is the opposite of belief and yet walks hand in hand with it. Mistrust and Suspicion are related, and these Hitches affect a lot of people. Think about whether you trust your politicians, police or your friends.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-incarna">
								<section id="t13ne-t13tx-194" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-incarna-text-section t13ne-textbox" title="Incarna">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-incarna-text-section-header t13ne-textbox-title">
									Incarna</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-incarna-text-section-footer t13ne-textbox-type">
									Faith</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-incarna-text-section-main t13ne-textbox-description">
									It is said that it is harder to kill an idea than a man, even more so a belief. Whether a prayer, a belief, or even a god that you are trying to model, you should consider a Zeal Incarna.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-location">
								<section id="t13ne-t13tx-195" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-location-text-section t13ne-textbox" title="Location">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-location-text-section-header t13ne-textbox-title">
									Location</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-location-text-section-footer t13ne-textbox-type">
									Vehicle</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-location-text-section-main t13ne-textbox-description">
									The Location is a Vehicle of some sort, such as a ship, coach, carriage, car, bus, lorry. Sometimes religious buildings may appear as Vehicles as well, such as shrines, temples, churches and cathedrals, as they allow transportation of the soul.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-monster">
								<section id="t13ne-t13tx-196" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-monster-text-section t13ne-textbox" title="Monster">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-monster-text-section-header t13ne-textbox-title">
									Monster</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-monster-text-section-footer t13ne-textbox-type">
									Celestial</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-monster-text-section-main t13ne-textbox-description">
									The Monster is a Celestial, a creature of divine or supernatural nature, often associated with a particular divinity, occasionally a political association, they often act as heralds of greater powers. Celestial beings include Anthropomorphic Personifications of social constructs like, Death, War, and Wyrd herself. When acting according to their nature, following their belief system, performing their duties, or following orders, they may draw Zeal Draw Ordeal cards into their Monster Pool. They automatically add Monster Pool Size Reduced Success Levels to any action to do with their nature, duty, travel, or communication. They also add Monster Pool Size Score or Pips to actions specific to their nature and duty. Celestial Monsters can only manifest a physical incarnation by playing cards directly from their Monster Pool on all physical actions. The monster could be an angel, a devil, a djinn, or perhaps even one of the Four Horsemen of the Apocalypse.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-narrative-moment">
								<section id="t13ne-t13tx-197" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-narrative-moment-resolved-section t13ne-textbox" title="Narrative Moment">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-narrative-moment-resolved-section-header t13ne-textbox-title">
									Narrative Moment</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-narrative-moment-resolved-section-footer t13ne-textbox-type">
									Motivation</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-narrative-moment-resolved-section-main t13ne-textbox-description">
									Characters have ways of gaining Sway from Persona, Core, Geometry and I-Ching. This Moment is meant to allow a Character a chance to gain Sway from one of these methods. These are often created by Yarn-Tellers for their own Characters, but can be fun to create for others, although obviously more difficult if little is known about the Character. Tale-wise these moments reveal Character motivations and drives, it shows the audience what this Character wants out of life (or at least out of life right now). A Motivation moment can reveal Personas, Cores, Geometries and I-Ching, as well as occasionally Hitches and Annexes. Although it will often only reveal one, this can be helpful information to have if you want to motivate the Character yourself later, and knowing the Persona may be important for a friendship or alliance.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-ordeal">
								<section id="t13ne-t13tx-198" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-ordeal-text-section t13ne-textbox" title="Ordeal">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-ordeal-text-section-header t13ne-textbox-title">
									Ordeal</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-ordeal-text-section-footer t13ne-textbox-type">
									Drive</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-ordeal-text-section-main t13ne-textbox-description">
									Drive Ordeals can be a measure of someone's personal drive, or how well they handle a vehicle, examples include, "Be Your Best", "Be The Fastest", "Weaving Through Traffic", "Touring", "Delivery Driver" and "Blue-Light Driving"</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-persona">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-persona">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-persona-header">
									Persona</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-persona-title">
									Fanatic</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-persona-main">
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Motivation</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											The Fanatic or "Enthusiasts" is motivated by an extreme and often uncritical enthusiasm for a cause, religion, hobby, job or form of entertainment. They may be a fan of a particular person (often an author, artist, or performer), a character, a genre of music or fiction, a particular manufacturer's products or a class of Descendant. Some Fanatics are devoted to a specific cause, such as a particular religion, or car manufacturer, where as others consider themselves more generally fanatical, like Theologians or Petrol-Heads.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Avoid</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											Most Fanatics will avoid and dismiss any and all criticism of their enthusiasm. If someone disagrees with their beliefs, the Fanatic will delight in proving them wrong, and making them see the errors of their ways.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Gain Chi</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
												<span>
													<strong>
													Gain Chi</strong>
												when you watch, engage in, or talk about what you are enthusiastic about.</span>
												<p>
													Ordeal <strong>
													Gain Chi</strong>
												when you play a ♦ as an action rather than attack or preparation.</p>
											</main>
										</section>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-quest">
								<section id="t13ne-t13tx-199" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-quest-text-section t13ne-textbox" title="Quest">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-quest-text-section-header t13ne-textbox-title">
									Quest</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-quest-text-section-footer t13ne-textbox-type">
									Flee</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-quest-text-section-main t13ne-textbox-description">
									Any time you start running and just keep going you are under the thrall of a Zeal Quest</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-resolved-hitch">
								<section id="t13ne-t13tx-200" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-resolved-hitch-resolved-section t13ne-textbox" title="Resolved Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-resolved-hitch-resolved-section-header t13ne-textbox-title">
									Resolved Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-resolved-hitch-resolved-section-footer t13ne-textbox-type">
									Grace</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-resolved-hitch-resolved-section-main t13ne-textbox-description">
									+1 Success Level to any a situation requiring grace, poise, aplomb or travel.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-style">
								<section id="t13ne-t13tx-201" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-style-text-section t13ne-textbox" title="Style">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-style-text-section-header t13ne-textbox-title">
									Style</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-style-text-section-footer t13ne-textbox-type">
									Speed</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-style-text-section-main t13ne-textbox-description">
									The Speed Style is favoured by quick, speedster hero and pilot types. The Speed Style Reserve can be spent on movement, attacks, evasion, perception, but cannot be spent on hiding or soaking damage. However, the current number of Cards in the Pool is automatically removed from the RT of all actions the Speed Style Reserve user makes, and count toward Card Number Initiative Order. Any GRT or RT costs can be automatically paid from the Speed Style Reserve by the User with +2 Pips to each card (so only a 3 is required to pay 1 GRT or 5 RT).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-sway">
								<section id="t13ne-t13tx-202" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-sway-text-section t13ne-textbox" title="Sway">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-sway-text-section-header t13ne-textbox-title">
									Sway</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-sway-text-section-footer t13ne-textbox-type">
									Verve</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-sway-text-section-main t13ne-textbox-description">
									Zeal Sway is also called Verve. Verve can be spent to as though it was Chi on any action that causes a change in position, mind, speed, direction, heart, or approach.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-test">
								<section id="t13ne-t13tx-203" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-test-text-section t13ne-textbox" title="Test">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-test-text-section-header t13ne-textbox-title">
									Test</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-test-text-section-footer t13ne-textbox-type">
									Accelerating / Believing / Determination / Driving / Enthusing / Faith / Self-belief / Suicide / Travelling</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-test-text-section-main t13ne-textbox-description">
									Zeal tests are tests of passion, enthusiasm, belief and determination, they control motion, in the form of both, drive and acceleration, and in their extremes they are part of any suicide attempt.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-tone">
								<section id="t13ne-t13tx-204" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-tone-text-section t13ne-textbox" title="Tone">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-tone-text-section-header t13ne-textbox-title">
									Tone</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-tone-text-section-footer t13ne-textbox-type">
									Chase</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-tone-text-section-main t13ne-textbox-description">
									Any chase, whether in a car, ship, plane or on foot across rooftops or through streets is an example of a Chase Tone. Chases can be short or long, and can be considered a close relative of Action. Chases need not be physical though, man-hunts and criminal investigations can also be chases. Chases emphasise physical and sensory actions, and particularly hiding, finding, and moving, there can be deep characterisation, but it not essential to the tone.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-turn">
								<section id="t13ne-t13tx-205" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-turn-text-section t13ne-textbox" title="Turn">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-turn-text-section-header t13ne-textbox-title">
									Turn</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-turn-text-section-footer t13ne-textbox-type">
									Ex Machina</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-turn-text-section-main t13ne-textbox-description">
									The Turn comes out of a machine? Well perhaps, actually while there may be a Devil or God in (or out of) the machine, with a sudden inexplicable twist of fate. Then again the turn can involve a piece of equipment (often a vehicle) behaving in a weird way (such as breaking down, running out of fuel or being plagued by Gremlins).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-twisted">
								<section id="t13ne-t13tx-206" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-twisted-text-section t13ne-textbox" title="Twisted">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-twisted-text-section-header t13ne-textbox-title">
									Twisted</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-twisted-text-section-footer t13ne-textbox-type">
									Beliefs</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-twisted-text-section-main t13ne-textbox-description">
									The Character's beliefs are twisted by their Twists, this may cause a Character to change religion (or more often corrupt their own somehow, Christians often become Satanists, or Fundamentalists, for example). It can also cause a person to appear to suffer Quixotic or paranoid behaviours, although often with a distinct Twist of its own. Each Duty, Defensive, Devotion, Dependence and Doubt Hitches the Character has are altered, or replaced with a Madness, Paranoia, Lack of Sense, Vague, or Apathy Hitch (as the Yarn-Teller and Player agree) when the Character has stored Twists, usually on a one for one basis (this has no effect on the Facet or Boon of the actual Hitch).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-annex-channel">
								<section id="t13ne-t13tx-207" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-annex-channel-text-section t13ne-textbox" title="Annex Channel">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-annex-channel-text-section-header t13ne-textbox-title">
									Annex Channel</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-annex-channel-text-section-main t13ne-textbox-description">
									Motion / Vehicles / Change</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-annex-root">
								<section id="t13ne-t13tx-208" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-annex-root-text-section t13ne-textbox" title="Annex Root">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-annex-root-text-section-header t13ne-textbox-title">
									Annex Root</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-annex-root-text-section-main t13ne-textbox-description">
									Faith / Belief / Travel</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-expand">
								<section id="t13ne-t13tx-209" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-nimbed-expand-text-section t13ne-textbox" title="Nimbed Expand">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-nimbed-expand-text-section-header t13ne-textbox-title">
									Nimbed Expand</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-nimbed-expand-text-section-main t13ne-textbox-description">
									Powerful, Add Zeal Nimbed Score to the Annex Score.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-focus">
								<section id="t13ne-t13tx-210" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-nimbed-focus-text-section t13ne-textbox" title="Nimbed Focus">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-nimbed-focus-text-section-header t13ne-textbox-title">
									Nimbed Focus</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-nimbed-focus-text-section-main t13ne-textbox-description">
									The Annex recovers rapidly, take Zeal Nimbed Score from the Annex RT to a minimum of the normal GRT of that Annex, and take Zeal Nimbed Draw from GRT (to a minimum of 0).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-reward">

				<section id="t13ne-t13tx-219" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-limit-section t13ne-textbox" title="Limit Card Pips">

					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-limit-section-main t13ne-textbox-description">
					14 Pips</main>
				</section>
				<section id="t13ne-t13tx-220" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-rule-roll-section t13ne-textbox" title="Dice Rules ">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-rule-roll-section-header t13ne-textbox-title">
					Dice Rules </header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-rule-roll-section-main t13ne-textbox-description">
					Immediate loss of consciousness is expected (well immediate loss of life is expected). Create a "Dead/Destroyed" Flaw Hitch, or increase the Boon of any Flaw Hitch by 1 Boon per (Miasma Boon treated as a Yarn Limit Duration) until healed. May instead alter the target’s Facet choices (turning to stone would be a forced change to a Burden Incarna, etc). Alternatively Decrease Character Scale by 1 or remove a Character's access to the Wounded Alternate.</main>
				</section>
				<section id="t13ne-t13tx-221" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-rule-ordeal-section t13ne-textbox" title="Card Rules ">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-rule-ordeal-section-header t13ne-textbox-title">
					Card Rules </header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-rule-ordeal-section-main t13ne-textbox-description">
					Immediately Treat Personality / Master Descendant as Crippled. At the end of the Round either create a new "Dead / Destroyed" Flaw Hitch (Half the Hitch Facet Boon + Miasma Score) or increase a Flaw Hitch by Miasma Score. Alternatively Decrease Scale by 1. If the Hitch Boon rises above the Hitch Facet Boon the Wound increases to Carnage+</main>
				</section>
				<section id="t13ne-t13tx-222" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-negative-normal-section t13ne-textbox" title="Negative Psych Normal ">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-negative-normal-section-header t13ne-textbox-title">
					Negative Psych Normal </header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-negative-normal-section-main t13ne-textbox-description">
					Traumatic Experience. Can create a Flaw Hitch of any Type, as the Ref decides. Consciousness is always lost until the wound is Stabilised. Note may remove a Character's access to the Wounded Alternate as the Alternate is "Dead".</main>
				</section>
				<section id="t13ne-t13tx-223" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-negative-extreme-section t13ne-textbox" title="Negative Psych Extreme">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-negative-extreme-section-header t13ne-textbox-title">
					Negative Psych Extreme</header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-negative-extreme-section-main t13ne-textbox-description">
					Extreme Psychological Trauma. Creates Maximised Flaw Hitches of any type, but favours... Fear, Madness, Vague (Amnesia), Paranoia, Loss of Sense (e.g. Hysterical Blindness) or Taboo Hitches. Consciousness is always lost until fully healed (Coma) and may remove a Character's access to the Wounded Alternate. Can create a new Split Alternate.</main>
				</section>
				<section id="t13ne-t13tx-224" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-positive-normal-section t13ne-textbox" title="Positive Psych Normal ">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-positive-normal-section-header t13ne-textbox-title">
					Positive Psych Normal </header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-positive-normal-section-main t13ne-textbox-description">
					Ecstatic Event. May Gain a new Talent Annex / Descendant. Can Create or Resolve a Flaw Hitch of any type, Consciousness is usually lost until Stabilized, and access to the Alternate may be lost.</main>
				</section>
				<section id="t13ne-t13tx-225" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-positive-extreme-section t13ne-textbox" title="Positive Psych Extreme">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-positive-extreme-section-header t13ne-textbox-title">
					Positive Psych Extreme</header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-wound t13ne-wound-psych-positive-extreme-section-main t13ne-textbox-description">
					Ego Death. May create or Resolve Flaw Hitches of any type but favours... Duty, Dependence, Madness, Vague (Amnesia), Paranoia, Loss of Sense (e.g. Hysterical Blindness) or Taboo Hitches. Consciousness is always lost until fully healed (coma). May create a new Alternate, Integrate an Alternate one Step toward Coalesce, or Gain a new Power Annex / Descendant.</main>
				</section>
			</main>

			<figcaption class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-card">
			Yarn: The Ambition</figcaption>
			<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-header t13ne-tooltip" tabindex="0">
				<section id="t13ne-t13tx-226" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-descbox-section t13ne-textbox" title="The Ambition">
					<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-descbox-section-header t13ne-textbox-title">
					The Ambition</header>
					<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-descbox-section-main t13ne-textbox-description">
					The Card of new Ambitions, sudden monetary gains, new business opportunities, new treasures or rumours of treasures and money being made. There may be conflict and collisions, new obstacles in the way or a Rival's ambitions may block progress.</main>
				</section>
			</header>
			<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main t13ne-tooltip">
				<div class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-div" tabindex="0">
					<section id="t13ne-t13tx-227" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-plot-section t13ne-textbox" title="Plot Significator">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-plot-section-header t13ne-textbox-title">
						Plot Significator</header>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-plot-section-main t13ne-textbox-description">
						This Plot is known as the "Rags-To-Riches" Plot. It seeks Characters of poor circumstance (the more Hitches the better) often from the Below side, and raises them up, granting them power and success. Such Characters often move from the Below side to the Pressed Side, and even reach the Dominant side occasionally (during a Revolution for example). However, once they are raised in riches and power, the Plot will pick a new Pauper to Hook from the Below.</main>
					</section>
					<section id="t13ne-t13tx-228" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-side-section t13ne-textbox" title="Side Significator">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-side-section-header t13ne-textbox-title">
						Side Significator</header>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-side-section-main t13ne-textbox-description">
						A side marked by The Ambition will have a strong desire to improve their situation during the Plot, this may cause them to act carelessly, but ruthlessly to achieve their ambition.</main>
					</section>
					<section id="t13ne-t13tx-229" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-char-section t13ne-textbox" title="Character Significator">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-char-section-header t13ne-textbox-title">
						Character Significator</header>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-char-section-main t13ne-textbox-description">
							The Ambition significator will make a Character who is defined by their Ambitions. The Character should set an Ambition. This should be a difficult to achieve ambition, such as "Become the Greatest Living Swordsman". <p>
								This gives the Character a <strong>
								Gain (Yin) Sway</strong>
							when they speak about this ambition or their current goals (which are usually a step toward their ultimate goal).</p>
							<p>
							Gain (Yang) Sway when they choose an option or take an action that hastens this ambition.</p>
							<p>
								They will also <strong>
								Gain Chi</strong>
							if their ambition is thwarted by another's actions.</p>
							<p>
							Additionally, when directly working towards their Ambition (such as training or challenging other swordsmen) they may add +1 Success Level.</p>
							<p>
							</p>
						</main>
					</section>
					<section id="t13ne-t13tx-230" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-scene-section t13ne-textbox" title="Scene Significator">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-scene-section-header t13ne-textbox-title">
						Scene Significator</header>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-main-scene-section-main t13ne-textbox-description">
						The Ambition Scenes are the scenes where we see a glimpse of what Characters want. Yarn-Tellers can play The Ambition to bring their own Ambitions closer, or reveal what another's goals are.</main>
					</section>
				</div>
				<div class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-div" tabindex="0">
					<section id="t13ne-t13tx-231" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-scene-section t13ne-textbox" title="Scene Beat Type">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-scene-section-header t13ne-textbox-title">
						Scene Beat Type</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-scene-section-footer t13ne-textbox-type">
						Hook</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-scene-section-main t13ne-textbox-description">
						Hooks hook a character into a Conflict. A Hook offers a Character (or Group) a reason to get involved in the Story. This lets the Plot use the Conflict Facet Boon/Value of the Character to help build their Conflict Annex.</main>
					</section>
					<section id="t13ne-t13tx-232" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ce-section t13ne-textbox" title="Conflict Embodiment">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ce-section-header t13ne-textbox-title">
						Conflict Embodiment</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ce-section-footer t13ne-textbox-type">
						External</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ce-section-main t13ne-textbox-description">
						The Conflict embodies this sides Facets Externally to the Characters. Embodiments might include Tones, Locations, Descendants (or Descendant Hitches), Quests, Ordeals/Tests and suitable Obstacles. External Embodiments are also commonly used in low-Tension Scenes where Pull or Push Embodiments are not yet meant to meet, as a stand-in Embodiment for the Character Embodiment. This is called an External Stand-in Embodiment, and we use it to work Conflicts in a lot of ways, including occasionally as Monsters before the real Monster is revealed.</main>
					</section>
					<section id="t13ne-t13tx-233" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fe-section t13ne-textbox" title="Facet Embodiment">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fe-section-header t13ne-textbox-title">
						Facet Embodiment</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fe-section-footer t13ne-textbox-type">
						Monster</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fe-section-main t13ne-textbox-description">
						The Conflict Embodies one Facet as a Monster Facet. This Monster might be a Dragon, an Orc Horde, or just a human Villain. Monsters can be great fun, but are rarely subtle. Where possible when using Monster embodiments, the Plot may want to keep the exact nature of the Monster a secret for as long as possible.</main>
					</section>
					<section id="t13ne-t13tx-234" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-hook-section t13ne-textbox" title="Hook">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-hook-section-header t13ne-textbox-title">
						Hook</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-hook-section-footer t13ne-textbox-type">
						Opportunity</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-hook-section-main t13ne-textbox-description">
						The Story hooks Characters by offering them an opportunity to Gain something they want or need to fulfil an ambition.</main>
					</section>
					<section id="t13ne-t13tx-235" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ha-section t13ne-textbox" title="Hook Aspect">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ha-section-header t13ne-textbox-title">
						Hook Aspect</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ha-section-footer t13ne-textbox-type">
						Geometry</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-ha-section-main t13ne-textbox-description">
						The Hook targets the Character's Geometry. For example: In order to Hook a Circle Geometry simply offer to fulfil an ambition.</main>
					</section>
					<section id="t13ne-t13tx-236" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-gain-section t13ne-textbox" title="Gain">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-gain-section-header t13ne-textbox-title">
						Gain</header>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-gain-section-main t13ne-textbox-description">
						Ultimate Power (A Super-Skill Descendant / An Artefact)</main>
					</section>
					<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-section">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-header">
						Revelations</header>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-main">
							<section id="t13ne-t13tx-237" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-about-section t13ne-textbox" title="About">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-about-section-header t13ne-textbox-title">
								About</header>
								<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-about-section-footer t13ne-textbox-type">
								Setting / Background</footer>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-about-section-main t13ne-textbox-description">
								The information is about the background, or setting, not the current plot or situation. It might include pertinent details for the current plot, but is usually just about expositional context in this case. The Player of the card should specify how the detail pertains to the current situation.</main>
							</section>
							<section id="t13ne-t13tx-238" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-info-section t13ne-textbox" title="Information">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-info-section-header t13ne-textbox-title">
								Information</header>
								<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-info-section-footer t13ne-textbox-type">
								Ambition</footer>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-info-section-main t13ne-textbox-description">
								Information that is about the ambitions of the Embodiment.</main>
							</section>
							<section id="t13ne-t13tx-239" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-vector-section t13ne-textbox" title="Vector">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-vector-section-header t13ne-textbox-title">
								Vector</header>
								<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-vector-section-footer t13ne-textbox-type">
								Informant</footer>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-vector-section-main t13ne-textbox-description">
								Someone tells you it clearly, but privately. They probably want to keep their identity secret, or certainly protected, but maybe not, perhaps they wish to be paid, or need something else from the Character.</main>
							</section>
							<section id="t13ne-t13tx-240" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-alt-section t13ne-textbox" title="Alternate Information">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-alt-section-header t13ne-textbox-title">
								Alternate Information</header>
								<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-alt-section-footer t13ne-textbox-type">
								Incarna</footer>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-alt-section-main t13ne-textbox-description">
								The information is about the Incarna of someone or something. If the Incarna is specified it is usually because it is special. So probably not Flesh and Blood...</main>
							</section>
							<section id="t13ne-t13tx-241" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-details-section t13ne-textbox" title="Detail">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-details-section-header t13ne-textbox-title">
								Detail</header>
								<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-details-section-footer t13ne-textbox-type">
								Functional</footer>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-rev-details-section-main t13ne-textbox-description">
								A functional detail is information about a function of the Narrative Element being revealed. It might include the fact that a particular car make cannot make certain tyre tracks, or that Rumble mountain isn't actually a volcano, but has a huge machine built within it.</main>
							</section>
						</main>
					</section>
					<section id="t13ne-t13tx-242" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fray-section t13ne-textbox" title="Fray">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fray-section-header t13ne-textbox-title">
						Fray</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fray-section-footer t13ne-textbox-type">
						Quest</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-fray-section-main t13ne-textbox-description">
						The Fray is a Quest, usually based on the Facets of the Conflict, for something the PC requires or desires.</main>
					</section>
					<section id="t13ne-t13tx-243" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-snag-section t13ne-textbox" title="Snag">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-snag-section-header t13ne-textbox-title">
						Snag</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-snag-section-footer t13ne-textbox-type">
						Falling Behind</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-snag-section-main t13ne-textbox-description">
							The Character's Rival or Opposition makes a Gain (or just advances to the next Stage of a larger Plot's Ordeal). You may Play another Card as a Gain, or use this card's <em>
							Ultimate Power</em>
						.</main>
					</section>
					<section id="t13ne-t13tx-244" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-sweeping-section t13ne-textbox" title="Sweeping">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-sweeping-section-header t13ne-textbox-title">
						Sweeping</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-sweeping-section-footer t13ne-textbox-type">
						Win</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-scene-sweeping-section-main t13ne-textbox-description">
						The Pressed side has a Win, this may be a battle against a weak or weakened foe, or they might catch a lucky break, or lottery win. The Win doesn't have to be big, just enough to keep hope alive, but a Gain is in order. Perhaps even the Resolution of a Hitch.</main>
					</section>
				</div>

					<section id="t13ne-t13tx-245" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-desc t13ne-archetype-section t13ne-textbox" title="NPC Archetype">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-desc t13ne-archetype-section-header t13ne-textbox-title">

						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-desc t13ne-archetype-section-footer t13ne-textbox-type">

						Enchanters or Enchantresses are magic users that use Charms and Enchantments to get what they want. If magic is off then they will use hypnotic or psychological tricks to charm, manipulate and seduce.</main>
					</section>
					<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona t13ne-awe t13ne-persona">
						<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona t13ne-awe t13ne-persona-header">
						Persona</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona t13ne-awe t13ne-persona-title">
						Idol</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona t13ne-awe t13ne-persona-main">
							<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section t13ne-textbox" title="Motivation">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section-header t13ne-textbox-title">
								Motivation</header>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section-main t13ne-textbox-description">
								Idols want to be respected, honoured, worshipped and adored for who they are, or what they do. They are motivated by positive social interactions, and cheers and laughs. A few Idols are even motivated by boos and jeers, content to play the villain for attention.</main>
							</section>
							<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section t13ne-textbox" title="Motivation">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section-header t13ne-textbox-title">
								Avoid</header>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section-main t13ne-textbox-description">
								Idols don't like to be alone, or ignored.</main>
							</section>
							<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section t13ne-textbox" title="Motivation">
								<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section-header t13ne-textbox-title">
								Gain Chi</header>
								<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-facet-box t13ne-archetype-persona-section-main t13ne-textbox-description">
									<span>
										<strong>
										Gain Chi</strong>
									when you speak, or draw attention to yourself.</span>
									<p>
										Ordeal <strong>
										Gain Chi</strong>
									when you play a ♦ to attack a target.</p>
								</main>
							</section>
						</main>
					</section>

						Prevailer</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-titled t13ne-archetype-core t13ne-liberty t13ne-core-text-section-main t13ne-textbox-description">
						Ignore a Hitch when triggered by paying Sway equal to the half the normal reward.</main>
					</section>
					<section id="t13ne-t13tx-247" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-titled t13ne-archetype-hitch t13ne-wyrd t13ne-hitch-text-section t13ne-textbox" title="Hitch">

						Hitch</header>
						<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-titled t13ne-archetype-hitch t13ne-wyrd t13ne-hitch-text-section-footer t13ne-textbox-type">
						Doomed</footer>
						<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-yarn t13ne-card-details-yarn-yarn-main-titled t13ne-archetype-hitch t13ne-wyrd t13ne-hitch-text-section-main t13ne-textbox-description">
