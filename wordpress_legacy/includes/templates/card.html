									Haunted is an additional Psychological/Supernatural component to the failure. The Character will be plagued by this failure, seeing the faces of those who died, or reliving the events for years to come. This usually is a Psyche Test that may create a suitable Hitch, such as "Fear", "Madness", "Lament" or "Doomed" Hitch.</main>

									As Awe is the Facet of Spirit its Incarna is Spirit. The Ka is the living soul that leaves the body upon death in the ancient religion of Egypt and echoes of this belief are found within most religions. Pick this Facet Incarna if you are wanting to play a ghost or nature spirit, or perhaps a Djinn or Familiar.</main>

									The Monster is a Fear or Anxiety embodied. They are quite diverse in form, but are always able to cause Psych attacks to any that see them act. They may add Awe Draw cards to their Monster Pool whenever they cause negative emotions in another Character. They automatically draw and play Monster Pool Reduced cards as a Psych Attack on any Character that sees them make an attack. They must add Awe Draw cards from their Monster Pool on any Psych attack. Examples of this Monster include Ghosts, some serial killers and some Preternatural Cosmic Horrors.</main>

									This Narrative Moment is about showing a Character's Inner or spiritual life. Are they a church-goer, a believer, or are they agnostic or even atheist? If a Character stops to pray, or if they attend church on holiday, it tells us something about them, as would the Character meditating, or daydreaming. It can appear as simply as how the Character blasphemes, or swears, or the way they gaze out of the window on the bus, instead of at the other passengers or their phone.</main>

											Idols want to be respected, honoured, worshipped and adored for who they are, or what they do. They are motivated by positive social interactions, and cheers and laughs. A few Idols are even motivated by boos and jeers, content to play the villain for attention.</main>

													<strong>
													Gain Chi</strong>
												when you speak, or draw attention to yourself.</span>
												<p>

													Gain Chi</strong>

											</main>

									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-awe t13ne-quest-text-section-main t13ne-textbox-description">
									The Quest may send the adventurers to a dangerous location, or to face a terrible monster or object, or instead they may simply have to charm an old woman they meet upon the way so that she will tell the secret of soothing the beast. Or perhaps they have to persuade their new boss to send them on that new job. The point is that the character on the Quest will have to use their Awe Facet to the best of their ability.</main>
								</section>

							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-resolved-hitch">

									+1 Success Level when you are bold, strong, or display worthiness (for example during Combat risking danger without a strong defence would count).</main>

									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-awe t13ne-style-text-section-main t13ne-textbox-description">
									The Elegant Style is often the choice of high society, nobles and politicians favour it. Elegant Style Reserves favour graceful movements (they add +1 Pip to each card for movement), and can be used for Perception, Reach or Ranged attacks, as well as evasion defences such as Dodging (where again they add +1 Pip to each card). Elegant Style Reserves can never be used to Soak, Heal or Normal Physical Melee Attacks.</main>
								</section>
							</li>

									Awe Sway is sometimes known as Splendour, and represents beauty, nobility and dignity. A point of Splendour acts as Chi when you are trying to impress someone, keep your cool, or maintain someone's respect, in all other respects it is normal Yang Tao Sway.</main>
								</section>

									When a Character wishes to affect another even spiritually, through their art, charms, or magic, or their own soul's attitude is tested, or if they want to project an attitude, emotion or state, like appearing cool or staying cool under pressure.</main>

									Any story that has an Awe Tone is going to be emotional. Whether its the heart-breaking plight of a boy and his dog, or a cancer-ridden mother trying to do the best for her children before she dies, this is the Tone of sad stories that are low on action, but high in characterisation.</main>

												Diamonds represent the finer things of life, they are bright and sparkling. Representing the creative even spiritual aspects of materialism such as beauty and art, that transcend base materialism like wealth. Despite this the Diamonds are recognised as being the Coins suit of the Tarot, with a strong tie to Elemental Earth.</main>

													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-attack-text-strong">

													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-attack-text-span t13ne-description">
													Destructive Attacks get +1 Wound Limit Level against certain taregts. Like how Hacks can really mess up Computers, Crashes can too, and Vehicles, and nothing flammable likes a Fry attack.</span>
												</p>
												<p class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-attack-text-details-p t13ne-rules">
													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-attack-text-strong t13ne-rules">
													Rules: </strong>
													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-attack-text-span t13ne-rules">
													All attacks against a suitable target (Ref decides) get a +1 Wound Limit Level.</span>
												</p>
											</details>
										</figure>
									</main>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-footer t13ne-attack-footer">
									Crash attacks affect vehicles and equipment, but extreme tiredness can have a Psyche effect on Characters. Crash Attacks can be Psyche, Energy, Physical, or Economic and are especially Destructive to Vehicles and Technology.</footer>
								</section>
							</li>

									The Failure Levels incur additional costs to the Action. This is often in the form of additional tasks, Stages or Tests that must be completed, such as gathering fresher ingredients, remaking a flawed component, helping a colleague or simply taking longer to complete than expected.</main>

									High craft of prolonged time. Craft is the Incarna to pick if you wish to play or build a carefully constructed, fiddly mechanical thing. You might want a robot or mechanimal to be made from Toil, many works of art are actually made from Craft.</main>

									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-location-text-section-header t13ne-textbox-title">

									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-location-text-section-footer t13ne-textbox-type">

									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-location-text-section-main t13ne-textbox-description">

							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-monster">
								<section id="t13ne-t13tx-56" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-monster-text-section t13ne-textbox" title="Monster">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-monster-text-section-header t13ne-textbox-title">
									Monster</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-monster-text-section-footer t13ne-textbox-type">
									Maker</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-monster-text-section-main t13ne-textbox-description">
									The Monster is actually a creator of other Monsters. The spawn are often less powerful than the creator, but in some cases are unique and more powerful. The Creator may not be directly encountered until late in the Story. The Creator can draw Craft Draw cards and add them to its Monster Pool each time it creates or summons an Extra or Descendant. At least 1 card must be used from the Monster Pool each Summoning or Creation to help pay the Summoning costs (or as an Obstacle / NPC Yarn card). All currently summoned Extras and Descendants receive a bonus to their Annex Score equal to the Creator's Monster Pool size.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-narrative-moment">
								<section id="t13ne-t13tx-57" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-narrative-moment-resolved-section t13ne-textbox" title="Narrative Moment">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-narrative-moment-resolved-section-header t13ne-textbox-title">
									Narrative Moment</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-narrative-moment-resolved-section-footer t13ne-textbox-type">
									Quirk</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-narrative-moment-resolved-section-main t13ne-textbox-description">
									Every one has quirks, something that they are the only person they know that does this thing. It may be a weird hobby, or professional specialisation that is very rare, or perhaps they just always keep a pencil tucked behind their right ear. This is a moment that is dedicated to lamp-shading or drawing attention to that quirk. We show off the quirk to make a Character feel more dimensioned, or deep, however quirks can be annoying and silly if they are overplayed or overused, so handle with care.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-ordeal">
								<section id="t13ne-t13tx-58" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-ordeal-text-section t13ne-textbox" title="Ordeal">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-ordeal-text-section-header t13ne-textbox-title">
									Ordeal</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-ordeal-text-section-footer t13ne-textbox-type">
									Descendant</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-ordeal-text-section-main t13ne-textbox-description">
									Descendant Ordeals are usually about acquiring or repairing Descendants, examples include "Raise a Barn", "Building", "Craft a Tool" and "Train a Skill".</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-persona">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-persona">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-persona-header">
									Persona</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-persona-title">
									Smith</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-persona-main">
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Motivation</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											Smiths are driven to create things (usually Descendants, although not always). They may sell the Descendants for a profit, but aren't interested in that side of things as much as creating the best Descendants (or otherwise) possible, be they weapons, armour, buildings, spaceships, or cakes. This motivation can lead the smith to quest for special ingredients, or to learn new skills. In general, a Smith will respect the work of another Smith, doing their best to learn from the art it represents.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Avoid</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											Smiths tend to avoid waste, any unused materials are recycled into a new project. Many Smiths avoid destruction of another Smith's work.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Gain Chi</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
												<span>
													<strong>
													Gain Chi</strong>
												when you spend (Craft Boon as Yarn Limit Duration) time with your creations, complete an Ordeal Stage in a Creation Ordeal, or simply create something.</span>
												<p>
													Ordeal <strong>
													Gain Chi</strong>
												when you use a Descendant you have created in Ordeal.</p>
											</main>
										</section>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-quest">
								<section id="t13ne-t13tx-59" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-quest-text-section t13ne-textbox" title="Quest">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-quest-text-section-header t13ne-textbox-title">
									Quest</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-quest-text-section-footer t13ne-textbox-type">
									Build / Work</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-craft t13ne-quest-text-section-main t13ne-textbox-description">

														Magic may just be technology we don't understand, or it can be a mysterious force unknowable and frightening to the common man. Magic can parry magic, and so <em>
														sometimes</em>
													can silver or cold iron, it depends on the magic. Magic attacks are rarely dodgeable (and the few that are are usually actually spells that perform energy attacks), and usually ignore Range, but instead must pierce the target's Liberty or Wyrd Boon Reduced (-4 Pips as standard).</span>

													Waning attacks are diminished, and fading, but like the moon, they never really go away.</span>

							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-failure">
								<section id="t13ne-t13tx-87" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-failure-text-section t13ne-textbox" title="Failure">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-failure-text-section-header t13ne-textbox-title">
									Failure</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-failure-text-section-footer t13ne-textbox-type">
									Misinformation</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-failure-text-section-main t13ne-textbox-description">
									Misinformation Failures are usually down to bad information. Maybe the map was wrong, or perhaps you believed a lie, often any information you gain from the action turns out to have been out of date or even enemy propaganda.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-hitch">
								<section id="t13ne-t13tx-88" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-hitch-text-section t13ne-textbox" title="Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-hitch-text-section-header t13ne-textbox-title">
									Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-hitch-text-section-footer t13ne-textbox-type">
									Paranoia</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-hitch-text-section-main t13ne-textbox-description">
									Too much knowledge can be a bad thing. Knowing that a conspiracy exists can make you see its agents everywhere; no matter how crazy that may make you look to others. For a spy, Paranoia is a perfectly normal response to living amongst the enemy. Most people however are not spies, are not persecuted by shadowy pseudo-governmental organizations, even if they believe they are.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-incarna">
								<section id="t13ne-t13tx-89" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-incarna-text-section t13ne-textbox" title="Incarna">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-incarna-text-section-header t13ne-textbox-title">
									Incarna</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-incarna-text-section-footer t13ne-textbox-type">
									Data / Truth</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-incarna-text-section-main t13ne-textbox-description">
									Perhaps you are trying to collect data, or want to write something down, or maybe you wish to play a living word, if so you are after the Orthodox Incarna.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-location">
								<section id="t13ne-t13tx-90" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-location-text-section t13ne-textbox" title="Location">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-location-text-section-header t13ne-textbox-title">
									Location</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-location-text-section-footer t13ne-textbox-type">
									Study</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-location-text-section-main t13ne-textbox-description">
									Study Locations range from a simple desk with a computer on it, up through offices and libraries, schools, laboratories, universities, research facilities, to science vessels, proving grounds, test tracks, and even areas of scientific interest. These areas are usually associated with those in charge, they will be prestigious schools, government sponsored research facilities, and at times, religious buildings, such as chanceries, mosques, temples and monasteries.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-monster">
								<section id="t13ne-t13tx-91" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-monster-text-section t13ne-textbox" title="Monster">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-monster-text-section-header t13ne-textbox-title">
									Monster</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-monster-text-section-footer t13ne-textbox-type">
									Tyrant</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-monster-text-section-main t13ne-textbox-description">
									The Orthodox Monster is a tyrant, often a part of “the system” (in that it acts as a method of control over a population). A Tyrant monster add Orthodox Draw cards to their Monster Pool every time they are cruel, ruthless, authoritarian or demanding. Tyrants can add Monster Pool Size Reduced Success Levels on another Character's actions if they order them to do something. Tyrants can also add Monster Pool Size Reduced Failure Levels to an enemy action for a cost of one card from their Monster Pool. The Tyrant must discard half of their their Monster Pool if they are ignored, forgotten or scorned.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-narrative-moment">
								<section id="t13ne-t13tx-92" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-narrative-moment-resolved-section t13ne-textbox" title="Narrative Moment">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-narrative-moment-resolved-section-header t13ne-textbox-title">
									Narrative Moment</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-narrative-moment-resolved-section-footer t13ne-textbox-type">
									Introduction</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-narrative-moment-resolved-section-main t13ne-textbox-description">
									The Character meets a new Character, this may be a new potential Love Interest, Rival, Ally, or some other Secondary Character, who will be important later. They may even be a future Monster or Big Bad, it is up to the Yarn-Teller. Such introductions often act as a Break to the current tale, although they are often also act as a Prod to a different Plot. Introductions can be quite formal with the new Character being given an introduction by a mutual acquaintance, or they can be more accidental meetings as the Yarn-Teller requires.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-ordeal">
								<section id="t13ne-t13tx-93" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-ordeal-text-section t13ne-textbox" title="Ordeal">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-ordeal-text-section-header t13ne-textbox-title">
									Ordeal</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-ordeal-text-section-footer t13ne-textbox-type">
									Knowledge</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-ordeal-text-section-main t13ne-textbox-description">
									Knowledge Ordeals are obviously about knowing things, such as, "Learning and Teaching Lessons", "Researching a Topic", and "Pop Quiz" </main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-persona">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-persona">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-persona-header">
									Persona</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-persona-title">
									Mentor</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-persona-main">
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Motivation</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											The Mentor is motivated by sharing and teaching others their knowledge. They often care deeply about their student's well-being, and may feel very responsible for them.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Avoid</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											The Mentor will always try to avoid losing their student's respect. A great mentor will never scold the student, instead turning any mistake they may make into a learning moment.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Gain Chi</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
												<span>
													<strong>
													Gain Chi</strong>
												when you educate, give advice, help, instruction, or Lecture another.</span>
												<p>
													Ordeal <strong>
													Gain Chi</strong>
												when you make a Lecture attack with or prepare a ♦. </p>
											</main>
										</section>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-quest">
								<section id="t13ne-t13tx-94" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-quest-text-section t13ne-textbox" title="Quest">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-quest-text-section-header t13ne-textbox-title">
									Quest</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-quest-text-section-footer t13ne-textbox-type">
									Learn / Teach</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-quest-text-section-main t13ne-textbox-description">
									Any time an NPC dispatches you to learn as much as you can about something, or to tell everyone about a subject then you are probably involved in an Orthodox Quest.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-resolved-hitch">
								<section id="t13ne-t13tx-95" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-resolved-hitch-resolved-section t13ne-textbox" title="Resolved Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-resolved-hitch-resolved-section-header t13ne-textbox-title">
									Resolved Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-resolved-hitch-resolved-section-footer t13ne-textbox-type">
									Truth</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-resolved-hitch-resolved-section-main t13ne-textbox-description">
									+1 Success to any action to do with learning, knowing facts, or determining veracity.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-style">
								<section id="t13ne-t13tx-96" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-style-text-section t13ne-textbox" title="Style">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-style-text-section-header t13ne-textbox-title">
									Style</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-style-text-section-footer t13ne-textbox-type">
									Traditional</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-style-text-section-main t13ne-textbox-description">
									The Traditional Style is preferred by smart types, as well as old masters and the like. The Traditional Style Reserve is useful for all aspects of an Ordeal. The Traditional Style has a host of Sub-Styles that you can choose from, Scientific, Specific Philosophies (Classical, Modern, Indian, Chinese, etc), Specific Religions (Buddhist, Shamanistic, Christian, etc). Some sub-styles may be more heavily restricted for specific uses than others. Christians for example cannot use their reserve to Attack. A Scientific Reserve could be used to perform experiments, but not make an emotional speech.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-sway">
								<section id="t13ne-t13tx-97" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-sway-text-section t13ne-textbox" title="Sway">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-sway-text-section-header t13ne-textbox-title">
									Sway</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-sway-text-section-footer t13ne-textbox-type">
									Facts</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-sway-text-section-main t13ne-textbox-description">
									Orthodox Sway are sometimes known as Facts. Facts can be spent as Chi on any action that tries to demonstrate or exert knowledge.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-test">
								<section id="t13ne-t13tx-98" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-test-text-section t13ne-textbox" title="Test">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-test-text-section-header t13ne-textbox-title">
									Test</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-test-text-section-footer t13ne-textbox-type">
									Examination / Knowing / Reading / Researching / Studying / Testing</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-test-text-section-main t13ne-textbox-description">
									Orthodox tests are about acquiring or demonstrating knowledge.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-tone">
								<section id="t13ne-t13tx-99" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-tone-text-section t13ne-textbox" title="Tone">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-tone-text-section-header t13ne-textbox-title">
									Tone</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-tone-text-section-footer t13ne-textbox-type">
									Historical / Documentary</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-tone-text-section-main t13ne-textbox-description">
									When the story is trying for historical accuracy, or documentary style reportage of events, then the Tone may well be Orthodox. Study, Teaching and Research actions are emphasised by the Tone, which also tends towards extreme realism. These tones can be especially useful for moving a story on, revealing Revelations and unearthing useful information. The Tone emphasises exposition, and detailed world-building, often over characterisation and motivations.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-turn">
								<section id="t13ne-t13tx-100" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-turn-text-section t13ne-textbox" title="Turn">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-turn-text-section-header t13ne-textbox-title">
									Turn</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-turn-text-section-footer t13ne-textbox-type">
									Discovery</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-turn-text-section-main t13ne-textbox-description">
									A Discovery is similar to a reveal, new information is revealed to the Character after some Quest / Test or Ordeal, usually involving Study or more likely experimentation. Often the new information is something that was not known to anyone before (or it may have been known of, but the implications were not considered). This is not the Detective finding out who killed the victim, this is the Detective realising that the intelligent killer she's hunting is not even human. This Turn can change plots massively as new technologies, lands, worlds, systems, procedures, creatures, or art-forms are discovered, in fact Discoveries can have implications across entire Multiverses sometimes.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-twisted">
								<section id="t13ne-t13tx-101" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-twisted-text-section t13ne-textbox" title="Twisted">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-twisted-text-section-header t13ne-textbox-title">
									Twisted</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-twisted-text-section-footer t13ne-textbox-type">
									Philosophy</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-twisted-text-section-main t13ne-textbox-description">
									The Character has a twisted and corrupted personal philosophy. They replace all their I-Ching with the twisted one (see I-ching) (it has no changing lines).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-annex-channel">
								<section id="t13ne-t13tx-102" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-annex-channel-text-section t13ne-textbox" title="Annex Channel">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-annex-channel-text-section-header t13ne-textbox-title">
									Annex Channel</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-annex-channel-text-section-main t13ne-textbox-description">
									Teaching / Learning</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-annex-root">
								<section id="t13ne-t13tx-103" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-annex-root-text-section t13ne-textbox" title="Annex Root">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-annex-root-text-section-header t13ne-textbox-title">
									Annex Root</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-annex-root-text-section-main t13ne-textbox-description">
									Lore / Knowledge</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-expand">
								<section id="t13ne-t13tx-104" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-expand-text-section t13ne-textbox" title="Nimbed Expand">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-expand-text-section-header t13ne-textbox-title">
									Nimbed Expand</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-expand-text-section-main t13ne-textbox-description">
									Grants Orthodox Boon Yin if successful, or in Yang if it fails.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-focus">
								<section id="t13ne-t13tx-105" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-focus-text-section t13ne-textbox" title="Nimbed Focus">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-focus-text-section-header t13ne-textbox-title">
									Nimbed Focus</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-focus-text-section-main t13ne-textbox-description">
									Facts, the Annex grants the user Orthodox Score facts (Revelation details, Annexes, Proficiencies, etc) about the Target if successful.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-reward">
								<section id="t13ne-t13tx-106" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-reward-text-section t13ne-textbox" title="Nimbed Reward">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-reward-text-section-header t13ne-textbox-title">
									Nimbed Reward</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-reward-text-section-main t13ne-textbox-description">
									Additional Annex Slot, the Annex automatically grants Orthodox Nimbed Score Extra Proficiencies, or adds Orthodox Nimbed Draw Skill Annexes pertaining to the Master Annex. E.g. A Magic Lore Annex with Orthodox Boon 13 grants 4 extra Proficiency Slots, or 1 Skill slot.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-trick">
								<section id="t13ne-t13tx-107" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-trick-text-section t13ne-textbox" title="Nimbed Trick">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-trick-text-section-header t13ne-textbox-title">
									Nimbed Trick</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-nimbed-trick-text-section-main t13ne-textbox-description">
									Diamonds Flush, any time the Annex plays at least 2 cards, and they are all Diamonds, then all Diamonds add one Success/Wound Level, and add all Diamonds from the Round Pool.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-umbral-limit">
								<section id="t13ne-t13tx-108" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-limit-text-section t13ne-textbox" title="Umbral Limit">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-limit-text-section-header t13ne-textbox-title">
									Umbral Limit</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-limit-text-section-main t13ne-textbox-description">
									Will only work in one specific environment (e.g. In Offices, in Wilderness, in Cyberspace, underwater, etc) in all others add a Failure Level.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-umbral-need">
								<section id="t13ne-t13tx-109" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-need-text-section t13ne-textbox" title="Umbral Need">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-need-text-section-header t13ne-textbox-title">
									Umbral Need</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-need-text-section-main t13ne-textbox-description">
									Specific Trigger, can only activate under specific circumstances (decided with Yarn-Teller/Referee on Annex Creation).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-umbral-sacrifice">
								<section id="t13ne-t13tx-110" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-sacrifice-text-section t13ne-textbox" title="Umbral Sacrifice">

									Umbral Sacrifice</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-sacrifice-text-section-main t13ne-textbox-description">
									Additional Annex Slot. The Annex fills an additional, smaller slot (e.g. Talent uses a Skill and Talent slot, a Skill would use an extra Proficiency slot.)</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-umbral-special">
								<section id="t13ne-t13tx-111" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-special-text-section t13ne-textbox" title="Umbral Special">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-special-text-section-header t13ne-textbox-title">
									Umbral Special</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-orthodox t13ne-umbral-special-text-section-main t13ne-textbox-description">
									The effects of the Annex may be completely undone by a specific circumstance. E.g. The effects of a vampiric power may be undone by killing the Vampire, or a magician's spells may be broken by spilling their blood.</main>
								</section>
							</li>

					</li>
					<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li">
						<ul class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-ul ">
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-facetname">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox t13ne-facet-name" title="Facet Name">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
									Facet Name</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
										<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-facet-name">
										Quiet</span>
										<span class="yang" title="Yin">
										⚋</span>
										<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-details">
											<summary class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-summary t13ne-redcard">
											♦</summary>
											<section id="t13ne-t13tx-112" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-description-section t13ne-textbox" title="Description: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-description-section-header t13ne-textbox-title">
												Description: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-description-section-main t13ne-textbox-description">
												Diamonds represent the finer things of life, they are bright and sparkling. Representing the creative even spiritual aspects of materialism such as beauty and art, that transcend base materialism like wealth. Despite this the Diamonds are recognised as being the Coins suit of the Tarot, with a strong tie to Elemental Earth.</main>
											</section>
											<section id="t13ne-t13tx-113" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section t13ne-textbox" title="Tarot Text: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section-header t13ne-textbox-title">
												Tarot Text: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section-main t13ne-textbox-description">
												Travel, Money, Business, Contracts, Deals, Voyages.</main>
											</section>
											<section id="t13ne-t13tx-114" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-trump-section t13ne-textbox" title="Ordeal Trump: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-trump-section-header t13ne-textbox-title">
												Ordeal Trump: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-trump-section-main t13ne-textbox-description">
												Preparation</main>
											</section>
											<section id="t13ne-t13tx-115" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-text-section t13ne-textbox" title="Ordeal Text: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-text-section-header t13ne-textbox-title">
												Ordeal Text: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-text-section-main t13ne-textbox-description">
												Ordeal Types: Travel (e.g. Chase, Race) / Creativity (e.g. Smithing, Painting). Diamonds act as Trump for the following Action Types: Art, Building, Charming, Crafting, Driving, Emoting, Forgiving, Keeping Your Cool, Listening, Meditation, Motion, Prayer, Preparation, Research, Sprinting and Working in general. Any type of action can be prepared with a Diamond.</main>
											</section>
											<section id="t13ne-t13tx-116" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-parry-section t13ne-textbox" title="Parry: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-header t13ne-textbox-title">
												Parry: </header>
												<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-footer t13ne-textbox-type">
												Seize the initiative</footer>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-main t13ne-textbox-description">
												The cards of the original attack (less the matched card) are immediately added to the Defender’s Ordeal Pool. They may then play as many cards as their Descendant/Annex normally plays including the Parry card (1-4) usually into one of their Style Reserve, and then immediately discard any cards over Pool Limit.</main>
											</section>
											<section id="t13ne-t13tx-117" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-soak-section t13ne-textbox" title="Soak: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-soak-section-header t13ne-textbox-title">
												Soak: </header>
												<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-soak-section-footer t13ne-textbox-type">
												Ready</footer>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-facetname-suit t13ne-facet-suit-suit-soak-section-main t13ne-textbox-description">
												The matched Attack card is immediately Prepared by the Defender (as they wish). The Soak card is discarded.</main>
											</section>
										</details>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-description">
								<section id="t13ne-t13tx-118" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-description-text-section t13ne-textbox" title="Description">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-description-text-section-header t13ne-textbox-title">
									Description</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-description-text-section-main t13ne-textbox-description">
									Quiet is the Yin Facet of receptive silence. In that silence rest quiescent woods, tranquil trees, hushed leaves and even the silent speech of books and plain libraries (and mute, conservative librarians). Sober, calm and studied Quiet is the only way to soothe its opposite Fury.</main>

													Psych (pronouced 'Sigh-ck') attacks target the Target's mind — which means they are only useful on Characters (even if those Characters may be Intelligent Descendants or Extras). All Wounds are targetted on the Personality Annex (or Master Annex for an Intelligent Descendant / Extra).</span>

													Energy attacks are blasts of radiation that are not entirely physical in nature. They might still have a physical impact, but the damage is usually radiation, or electrical burns/muscle twitch.</span>
												</p>
											</details>

													The simplest forms of wounding are nothing but bashing and cutting physical wounds. Physical attacks are usually performed with weapons (Prop Descendants) or Martial Arts Annexes, which means they can be blocked, parried and so on by another weapon or Martial Art.</span>
												</p>

											<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-attack-text-details">

														Magic may just be technology we don't understand, or it can be a mysterious force unknowable and frightening to the common man. Magic can parry magic, and so <em>
														sometimes</em>
													can silver or cold iron, it depends on the magic. Magic attacks are rarely dodgeable (and the few that are are usually actually spells that perform energy attacks), and usually ignore Range, but instead must pierce the target's Liberty or Wyrd Boon Reduced (-4 Pips as standard).</span>

													Damage caused is Economical/Social. The damage may be soaked by certain defences, but it is unlikely you will have suitable armour. Wounds are usually taken in Pips of Chi, but may attack financial Descendants and create Impoverished Hitches, etc.</span>

													Penetrates</strong>

													Some attacks can pierce armour and tough skin. They penetrate, making the attack harder to block, soak and be stopped by armour.</span>

													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-attack-text-strong t13ne-rules">

														Penetration adds extra Pips to the card for calculation of defense purposes. 
														<ul>
															<li>
															The Card adds the Pips Reduced as Penetration Pips.</li>

															<li>
															Penetration Pips add directly to card Pips of the card whenever the Attacker wants, but are each usable only once.</li>

															<li>
															Against Prepared Defences 🔲 the Pips can be added to make the card bypass the Pip wall (and costs the Pip Wall the extra Penetration Pips too.</li>

															<li>
															Against Parry ⚔🔍 defences the Pips may be added to stop cards matching (The Defending weapon may also have Penetration Pips, and Refs may allow them to spend theirs too).</li>

															<li>
															Dodges 👣🦋👟 that have to beat the Pips also have to beat the points of Penetration.</li>

															<li>
															When Soaked ☔💭 or Blocked 🛡, Penetration allows Pips to leak from the original Attack Card to the Wound inside the Soak-Layer, whenever the Attacker wants to use them.</li>
														</ul>
													</span>
												</p>

									Erode attacks can take millions of years to affect a mountain or rock, but a sandstorm can have the same effect on a person or vehicle in a few minutes. Accelerated time, like a Never-Time, Paradox or Chronoclysm Bomb can also have Erode effects. As a Psych attack an Erode wears down the Target with a cycle of abuse or corrosive language. Erode attacks Penetrate.</footer>

									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-descendants-text-section-main t13ne-textbox-description">
									Quiet Descendants are called hushed or wooden. They may be serene powers gained by silent meditation, whispered secrets, written words, anything designed to do a noisy thing more quietly, or anything made from wood. Some weapons are hushed for example, with silencers, stiletto knives and garrottes all being excellent examples of trying to make killing quieter and staves, clubs, wands and bows all being wooden weapons and tools. Wood is itself an example of a hushed Descendant, it grows silently, even splitting and breaking stone with nothing more than a few creaks and the susurrus of leaves.</main>

									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-failure-text-section-footer t13ne-textbox-type">
