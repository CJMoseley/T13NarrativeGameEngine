									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-failure-text-section-main t13ne-textbox-description">
									A Reserve failure usually results in a loss of cards from a Style Reserve or Monster Pool. One card is lost per Failure Level. These are usually quiet, undramatic failures that can appear to not even be happening at all to a casual observer. Occasionally, a reserve failure will result in a Strong emotional reaction in the Character, that can include a Psych Attack.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-hitch">
								<section id="t13ne-t13tx-123" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-hitch-text-section t13ne-textbox" title="Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-hitch-text-section-header t13ne-textbox-title">
									Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-hitch-text-section-footer t13ne-textbox-type">
									Dependence</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-hitch-text-section-main t13ne-textbox-description">
									We all have things that depend on us and things on which we depend. From family and society to addictions, or just having to plug a device in to get it too work. Children depend on their parents, and both can represent this with a Dependence Hitch.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-incarna">
								<section id="t13ne-t13tx-124" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-incarna-text-section t13ne-textbox" title="Incarna">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-incarna-text-section-header t13ne-textbox-title">
									Incarna</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-incarna-text-section-footer t13ne-textbox-type">
									Wood</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-incarna-text-section-main t13ne-textbox-description">
									When you need to model plants, or any wooden structure, or if you have a pressing need to play a sentient vegetable then you'll want to look at a Quiet Formation Facet.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-location">
								<section id="t13ne-t13tx-125" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-location-text-section t13ne-textbox" title="Location">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-location-text-section-header t13ne-textbox-title">
									Location</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-location-text-section-footer t13ne-textbox-type">
									Placid</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-location-text-section-main t13ne-textbox-description">
									Placid Locations are serene, tranquil, places. They might be a quiet suburban residence, garden or out-of-the-way square, library or a placid pool, tranquil grove, a roadside shelter, shrine or chapel. The silent desert, the remote step, deep forest and calm water are all good examples.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-monster">
								<section id="t13ne-t13tx-126" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-monster-text-section t13ne-textbox" title="Monster">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-monster-text-section-header t13ne-textbox-title">
									Monster</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-monster-text-section-footer t13ne-textbox-type">
									Hush</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-monster-text-section-main t13ne-textbox-description">
									The Quiet Monster is exactly that, almost (or entirely) silent. It is the creeping death of a hidden illness, or the cat-footed predator striking without warning that vanishes without trace. Hush Monsters get to begin with Quiet Score cards in their Monster Pool. Hushes may add +1 Score / Pip for each card in their Monster Pool when they try to act silently. When a Hush creature makes a noise (often a scream or howl, including a Psych attack), it must play at least half of the Monster Pool on the action. Hush Monsters may add cards to their Monster Pool based on how long it has been since the last time they made a noise as a Yarn Extend Duration (e.g. After being silent for a few seconds add a card, after a scene of silence add two. Be silent for a week and add 6 cards to the Pool). Creatures like giant owls, snakes or cats, that stalk and hunt silently are good examples, as is a really creepy, floating mime. Many ghosts are also silent, until they turn and scream to create a Duck attack.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-narrative-moment">
								<section id="t13ne-t13tx-127" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-narrative-moment-resolved-section t13ne-textbox" title="Narrative Moment">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-narrative-moment-resolved-section-header t13ne-textbox-title">
									Narrative Moment</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-narrative-moment-resolved-section-footer t13ne-textbox-type">
									The Quiet One Speaks</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-narrative-moment-resolved-section-main t13ne-textbox-description">
									This is not as simple as a Quiet Character suddenly talking, the moment is what makes them speak, and it doesn't have to be speaking. If a Character never laughs, then this is an event that tickles their humour. A Character who never cries will burst into tears due to this event. Then again it can also be the moment that the silent Character suddenly decides to share a profound story or observation. Such events depend on the Character obviously, but they usually evoke an emotion that the Character has not yet (or rarely) displayed.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-ordeal">
								<section id="t13ne-t13tx-128" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-ordeal-text-section t13ne-textbox" title="Ordeal">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-ordeal-text-section-header t13ne-textbox-title">
									Ordeal</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-ordeal-text-section-footer t13ne-textbox-type">
									Silent</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-ordeal-text-section-main t13ne-textbox-description">
									Silent Ordeals are when you must keep quiet, such as, "Meditation, Contemplation and Deep Thinking", "Silent Communication (Reading / Writing / Symbols / Signs / Ideograms / Letters / Glyphs / Runes)", "Don't Attract Attention" "Listening", and "Keeping Secrets" </main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-persona">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-persona">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-persona-header">
									Persona</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-persona-title">
									Hermit</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-persona-main">
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Motivation</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											The Hermit is motivated by either a sense of spiritual purity, or an asocial nature. They do not feel they gain anything by superficial conversation, and may believe they lose something when they interact with others.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Avoid</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											The Hermit will avoid crowds and conversations where possible, some will even takes vows of silence, or holy orders in order to separate themselves from society.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Gain Chi</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
												<span>
													<strong>
													Gain Chi</strong>
												when you work or act silently or alone, ignore company or avoid a social situation, think deeply, or answer a question with as few words as possible (a gesture ideally). </span>
												<p>
													Ordeal <strong>
													Gain Chi</strong>
												when you draw a ♦ </p>
											</main>
										</section>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-quest">
								<section id="t13ne-t13tx-129" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-quest-text-section t13ne-textbox" title="Quest">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-quest-text-section-header t13ne-textbox-title">
									Quest</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-quest-text-section-footer t13ne-textbox-type">
									Study</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-quest-text-section-main t13ne-textbox-description">
									If the Ref says you need to study up on something, perhaps those looming mid-terms, then you can be assured the Quest is Quiet</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-resolved-hitch">
								<section id="t13ne-t13tx-130" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-resolved-hitch-resolved-section t13ne-textbox" title="Resolved Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-resolved-hitch-resolved-section-header t13ne-textbox-title">
									Resolved Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-resolved-hitch-resolved-section-footer t13ne-textbox-type">
									Serenity</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-resolved-hitch-resolved-section-main t13ne-textbox-description">
									+1 Success Level to all Psych Defences.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-style">
								<section id="t13ne-t13tx-131" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-style-text-section t13ne-textbox" title="Style">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-style-text-section-header t13ne-textbox-title">
									Style</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-style-text-section-footer t13ne-textbox-type">
									Silent</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-style-text-section-main t13ne-textbox-description">
									The Silent Style is favoured by thieves, assassins and other cautious types. The Silent Style Reserve can be used to any effect as long as the user remains silent. If the user of a Silent Style is forced to make any noise (stepping on that squeaky floorboard, or taking a big enough Psych wound) the Style Reserve is immediately discarded.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-sway">
								<section id="t13ne-t13tx-132" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-sway-text-section t13ne-textbox" title="Sway">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-sway-text-section-header t13ne-textbox-title">
									Sway</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-sway-text-section-footer t13ne-textbox-type">
									Serenity</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-sway-text-section-main t13ne-textbox-description">
									Quiet Sway is also called Serenity, and can be spent as though it was Chi on any attempt to keep calm, stay silent, or think deep thoughts.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-test">
								<section id="t13ne-t13tx-133" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-test-text-section t13ne-textbox" title="Test">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-test-text-section-header t13ne-textbox-title">
									Test</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-test-text-section-footer t13ne-textbox-type">
									Calming / Listening / Meditation / Sneaking</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-test-text-section-main t13ne-textbox-description">
									Quiet tests are all about maintaining or achieving that inner-calm and outer silence.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-tone">
								<section id="t13ne-t13tx-134" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-tone-text-section t13ne-textbox" title="Tone">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-tone-text-section-header t13ne-textbox-title">
									Tone</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-tone-text-section-footer t13ne-textbox-type">
									Suspenseful</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-tone-text-section-main t13ne-textbox-description">
									Suspense is the lifeblood of the Thriller. The Quiet Tone governs and is governed by the unknown, creating a need to know, and sense of anticipation. Suspense Tone relies on timing and carefully controlled revealing of information. Suspense needs to build throughout the Story, although some Action and Comedy scenes should be interspersed to break tension and reset the suspense levels. Suspense is easily lost if too much information is revealed, and that can be difficult to handle. Suspense Tone emphasises unknowns, forcing the characters to ask questions to which there may be no answers, or at least no good ones, like what do we do now, or what are they going to do next?</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-turn">
								<section id="t13ne-t13tx-135" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-turn-text-section t13ne-textbox" title="Turn">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-turn-text-section-header t13ne-textbox-title">
									Turn</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-turn-text-section-footer t13ne-textbox-type">
									Silence</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-turn-text-section-main t13ne-textbox-description">
									Silence as a Turn is a situation where either you can't contact someone you should be able to (such as them being on holiday, or in hospital), or if you are operating under radio silence, someone breaks it for an emerging emergency. Sometimes a lack of information is as important as information itself.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-twisted">

									Mind</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-twisted-text-section-main t13ne-textbox-description">
										The Character's Mind is Twisted by the Twists present and this causes their Persona or Core to change, adding the following effect. <strong>
										Gain Chi</strong>
									When you trail of in the middle of what you are saying, forget what you were doing, or echo the last words said to you (optionally in a whisper).</main>

									Annex Root</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-annex-root-text-section-main t13ne-textbox-description">

									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-expand-text-section-header t13ne-textbox-title">
									Nimbed Expand</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-expand-text-section-main t13ne-textbox-description">
									The Annex automatically activates in response to certain stimuli. When activated by the “trigger” the use does not use up a Descendant or Character’s action. This Nimbed is required to allow an Annex or Descendant to be added to an Ordeal Proficiency / Initiative roll. RT applies but not GRT (see also Rook “Passive” Nimbed).</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-focus">

									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-focus-text-section-header t13ne-textbox-title">
									Nimbed Focus</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-focus-text-section-main t13ne-textbox-description">
									Subtle, The Annex's use can be so subtle that it may require days of study to determine the complete effects of the Annex. Whilst there will be an immediate obvious effect, there will be other more subtle effects at play. Add Quiet Score to the Pips of all Ordeal cards 'prepared' with this Annex.</main>
								</section>

									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-reward-text-section-header t13ne-textbox-title">

									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-reward-text-section-main t13ne-textbox-description">
									Practice, Draw Quiet Nimbed Draw Extra cards in the Annex's action.</main>
								</section>

									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-trick-text-section-header t13ne-textbox-title">
									Nimbed Trick</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-nimbed-trick-text-section-main t13ne-textbox-description">
									Sets, the Annex may play multiple cards of the same Pips as though they were a single card. This will also allow similar cards to be played from the Round Pool E.g. Playing 5♠, 5♣, 5♦, 9♠ and 9♥ counts as playing only Two cards, and may play 5's and 9's from the Round Pool.</main>
								</section>

								<section id="t13ne-t13tx-143" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-umbral-limit-text-section t13ne-textbox" title="Umbral Limit">

									Umbral Need</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-umbral-need-text-section-main t13ne-textbox-description">

									Practice, the User must practice the Annex for Annex Score hours each week for Quiet Umbral Score Weeks before they can activate. Failure to Practice adequately will stop Annex from Activating until practice is completed.</main>
								</section>

							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-umbral-special">
								<section id="t13ne-t13tx-146" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-umbral-special-text-section t13ne-textbox" title="Umbral Special">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-umbral-special-text-section-header t13ne-textbox-title">
									Umbral Special</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-quiet t13ne-umbral-special-text-section-main t13ne-textbox-description">
									Must roll over the Quiet Umbral Boon Value on a d200, Yin may be spent on d6s to increase the roll to activate the Annex.</main>
								</section>

					</li>
					<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li">
						<ul class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-ul ">
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-facetname">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox t13ne-facet-name" title="Facet Name">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
									Facet Name</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
										<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-facet-name">
										Virtue</span>
										<span class="yang" title="Yin">
										⚋</span>
										<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-details">
											<summary class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-summary t13ne-redcard">
											♦</summary>
											<section id="t13ne-t13tx-147" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-description-section t13ne-textbox" title="Description: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-description-section-header t13ne-textbox-title">
												Description: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-description-section-main t13ne-textbox-description">
												Diamonds represent the finer things of life, they are bright and sparkling. Representing the creative even spiritual aspects of materialism such as beauty and art, that transcend base materialism like wealth. Despite this the Diamonds are recognised as being the Coins suit of the Tarot, with a strong tie to Elemental Earth.</main>
											</section>
											<section id="t13ne-t13tx-148" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section t13ne-textbox" title="Tarot Text: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section-header t13ne-textbox-title">
												Tarot Text: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section-main t13ne-textbox-description">
												Travel, Money, Business, Contracts, Deals, Voyages.</main>
											</section>
											<section id="t13ne-t13tx-149" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-trump-section t13ne-textbox" title="Ordeal Trump: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-trump-section-header t13ne-textbox-title">
												Ordeal Trump: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-trump-section-main t13ne-textbox-description">
												Preparation</main>
											</section>
											<section id="t13ne-t13tx-150" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-text-section t13ne-textbox" title="Ordeal Text: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-text-section-header t13ne-textbox-title">
												Ordeal Text: </header>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-ordeal-text-section-main t13ne-textbox-description">
												Ordeal Types: Travel (e.g. Chase, Race) / Creativity (e.g. Smithing, Painting). Diamonds act as Trump for the following Action Types: Art, Building, Charming, Crafting, Driving, Emoting, Forgiving, Keeping Your Cool, Listening, Meditation, Motion, Prayer, Preparation, Research, Sprinting and Working in general. Any type of action can be prepared with a Diamond.</main>
											</section>
											<section id="t13ne-t13tx-151" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-parry-section t13ne-textbox" title="Parry: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-header t13ne-textbox-title">
												Parry: </header>
												<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-footer t13ne-textbox-type">
												Seize the initiative</footer>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-main t13ne-textbox-description">
												The cards of the original attack (less the matched card) are immediately added to the Defender’s Ordeal Pool. They may then play as many cards as their Descendant/Annex normally plays including the Parry card (1-4) usually into one of their Style Reserve, and then immediately discard any cards over Pool Limit.</main>
											</section>
											<section id="t13ne-t13tx-152" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-soak-section t13ne-textbox" title="Soak: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-soak-section-header t13ne-textbox-title">
												Soak: </header>
												<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-soak-section-footer t13ne-textbox-type">
												Ready</footer>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-facetname-suit t13ne-facet-suit-suit-soak-section-main t13ne-textbox-description">
												The matched Attack card is immediately Prepared by the Defender (as they wish). The Soak card is discarded.</main>
											</section>
										</details>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-description">
								<section id="t13ne-t13tx-153" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-description-text-section t13ne-textbox" title="Description">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-description-text-section-header t13ne-textbox-title">
									Description</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-description-text-section-main t13ne-textbox-description">
									Virtue is the Yin Facet that governs Goodness. The Facet is the home of hope, love and charity. Incorruptible and innocent, it is the Facet of worth and worthiness, and the only Facet that has the compassion to embrace its opposite Sin.</main>
								</section>
							</li>

								<section id="t13ne-t13tx-160" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-location-text-section t13ne-textbox" title="Location">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-location-text-section-header t13ne-textbox-title">
									Location</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-location-text-section-footer t13ne-textbox-type">
									Sacred</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-location-text-section-main t13ne-textbox-description">
									Sacred Locations mean different things to different people, for some a cathedral, church or any holy building is an example, for others it is a sports-field, kitchen or hospital.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-monster">
								<section id="t13ne-t13tx-161" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-monster-text-section t13ne-textbox" title="Monster">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-monster-text-section-header t13ne-textbox-title">
									Monster</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-monster-text-section-footer t13ne-textbox-type">
									Friendly</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-monster-text-section-main t13ne-textbox-description">
									The Monster is a “Friendly” monster, that will almost certainly be misunderstood and attacked by some people. They may add Virtue Draw cards to their Monster Pool by being kind to another, or whenever they are attacked. A friendly Monster protects their friends from harm, and must play cards from their Monster Pool to defend, protect, or heal them. Friendly monsters may add a number of Failure Levels equal to the Monster Pool Size Reduced to any enemy that tries to target them or their friends. Friendly Monsters can add Virtue Score (rolled Die or otherwise) to any positive action when playing a card from their Monster Pool. Examples might include a cynical, but big-hearted ogre; a being created from stitched together corpses; a dark-elf ranger with a unicorn necklace; or perhaps even an Electric Mouse.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-narrative-moment">
								<section id="t13ne-t13tx-162" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-narrative-moment-resolved-section t13ne-textbox" title="Narrative Moment">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-narrative-moment-resolved-section-header t13ne-textbox-title">
									Narrative Moment</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-narrative-moment-resolved-section-footer t13ne-textbox-type">
									Ties That Bind</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-narrative-moment-resolved-section-main t13ne-textbox-description">
									One of the Character’s friends, Allies, or family is having an important event, such as a birthday, wedding, christening, bar mitzvah, business launch, court case, thanksgiving, soul-feast, recital, party or funeral, and the Character is expected to be there. More often events like this form part of a proper plot, but occasionally they just happen to Characters almost out of the blue, with little notice other than,"I'm having a party tomorrow, be there." These events help to ground a Character, showing them interacting with Characters outside the normal flow of the tale, in a relaxed (or occasionally highly pressured) social setting.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-ordeal">
								<section id="t13ne-t13tx-163" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-ordeal-text-section t13ne-textbox" title="Ordeal">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-ordeal-text-section-header t13ne-textbox-title">
									Ordeal</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-ordeal-text-section-footer t13ne-textbox-type">
									Righteous</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-ordeal-text-section-main t13ne-textbox-description">
									Righteous Ordeals come in many types, some examples include, "Honour Bound", "Falling In Love", "Ethical Treatment", "Test of Faith", and "Pure of Heart".</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-persona">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-persona">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-persona-header">
									Persona</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-persona-title">
									Hallow</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-persona-main">
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Motivation</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											A Hallow (or Saint) is motivated by a profound sense of morals. The Hallow may be a pacifist, or a pragmatist, but are driven by a strict moral code. The details of the moral code vary, but are usually those of a religion, and will almost always be based around empathy for others. A Hallow may feel a need to enforce their moral code on others, but most just try to live as an example to others. The Hallow acts as a moral guide, not by lectures, but by leading the way.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Avoid</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
											A Hallow will of course avoid breaking, being accused of breaking, or even appearing to break, their moral code.</main>
										</section>
										<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Motivation">
											<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
											Gain Chi</header>
											<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
												<span>
													<strong>
													Gain Chi</strong>
												when you act according to your personal moral code, quote that code, or display empathy for others.</span>
												<p>
													Ordeal <strong>
													Gain Chi</strong>
												when you play any card not to attack.</p>
											</main>
										</section>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-quest">
								<section id="t13ne-t13tx-164" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-quest-text-section t13ne-textbox" title="Quest">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-quest-text-section-header t13ne-textbox-title">
									Quest</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-quest-text-section-footer t13ne-textbox-type">
									Convert / Protect</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-quest-text-section-main t13ne-textbox-description">
									When you are tasked with a literal mission to convert a bunch on the ungodly then you are probably under the influence of a Virtue Quest.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-resolved-hitch">
								<section id="t13ne-t13tx-165" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-resolved-hitch-resolved-section t13ne-textbox" title="Resolved Hitch">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-resolved-hitch-resolved-section-header t13ne-textbox-title">
									Resolved Hitch</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-resolved-hitch-resolved-section-footer t13ne-textbox-type">
									Interest</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-resolved-hitch-resolved-section-main t13ne-textbox-description">
									+1 Success Level to all actions to do with pursuing that Interest.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-style">
								<section id="t13ne-t13tx-166" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-style-text-section t13ne-textbox" title="Style">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-style-text-section-header t13ne-textbox-title">
									Style</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-style-text-section-footer t13ne-textbox-type">
									Dazzling</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-style-text-section-main t13ne-textbox-description">
									The Dazzling Style is favoured by pacifists, politicians and Seelie Faeries. The Dazzling Style Reserve may be used for almost any effect, although if used for a Physical Attack the Reserve is immediately discarded.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-sway">
								<section id="t13ne-t13tx-167" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-sway-text-section t13ne-textbox" title="Sway">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-sway-text-section-header t13ne-textbox-title">
									Sway</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-sway-text-section-footer t13ne-textbox-type">
									Merits</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-sway-text-section-main t13ne-textbox-description">
									Virtue Sway is sometimes called Merits. Merits are spent as Chi on actions to convert others, particularly changing minds and opinions and catching the attention of the divine for transformation through prayer.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-test">
								<section id="t13ne-t13tx-168" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-test-text-section t13ne-textbox" title="Test">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-test-text-section-header t13ne-textbox-title">
									Test</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-test-text-section-footer t13ne-textbox-type">
									Converting / Diligence / Eagerness / Innocence / Persuading / Praying / Temperance / Transforming</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-test-text-section-main t13ne-textbox-description">
									Virtue tests are often about converting or changing another's mind by persuasion, and the virtues of your argument; or they can be about demonstrating a virtue, such as eagerness, diligence, temperance, or innocence.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-tone">
								<section id="t13ne-t13tx-169" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-tone-text-section t13ne-textbox" title="Tone">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-tone-text-section-header t13ne-textbox-title">
									Tone</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-tone-text-section-footer t13ne-textbox-type">
									Romantic</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-tone-text-section-main t13ne-textbox-description">
									Momentum and not love may make the world go around, but love can certainly drive a narrative on, and the Virtue Tone is the main way it does it. Traditionally, romance is a hero and a heroine uniting against the odds, but in these post-modern days that simple equation has a whole lot of other variants. The Romantic tone emphasises the interactions of characters, although often a situation will occur that places barriers, especially social or emotional ones, between the characters involved.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-turn">
								<section id="t13ne-t13tx-170" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-turn-text-section t13ne-textbox" title="Turn">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-turn-text-section-header t13ne-textbox-title">
									Turn</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-turn-text-section-footer t13ne-textbox-type">
									Change of Heart</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-turn-text-section-main t13ne-textbox-description">
									Sometimes we fight for what we want only to get it, and we find out it does not have the effect we thought it would. Hate can turn to love and vice-versa under the right circumstances, and this is one of those circumstance. Characters who were in love, or loyal to a cause can suddenly change their minds, because of new information, or actions taken by a Character.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-twisted">
								<section id="t13ne-t13tx-171" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-twisted-text-section t13ne-textbox" title="Twisted">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-twisted-text-section-header t13ne-textbox-title">
									Twisted</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-twisted-text-section-footer t13ne-textbox-type">
									Morals</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-twisted-text-section-main t13ne-textbox-description">
									The Characters morals and religious stance is twisted by the presence of Twists. What they once found unconscionable is now reasonable. All Taboo or Duty Hitches are immediately reversed while the Character has Twists.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-annex-channel">
								<section id="t13ne-t13tx-172" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-annex-channel-text-section t13ne-textbox" title="Annex Channel">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-annex-channel-text-section-header t13ne-textbox-title">
									Annex Channel</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-annex-channel-text-section-main t13ne-textbox-description">
									Energy / Holy / Saintly</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-annex-root">
								<section id="t13ne-t13tx-173" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-annex-root-text-section t13ne-textbox" title="Annex Root">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-annex-root-text-section-header t13ne-textbox-title">
									Annex Root</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-virtue t13ne-annex-root-text-section-main t13ne-textbox-description">
									Virtue / Moral / Ethical</main>
								</section>

							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-nimbed-expand">

												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-description-section-header t13ne-textbox-title">

												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-description-section-main t13ne-textbox-description">
												Diamonds represent the finer things of life, they are bright and sparkling. Representing the creative even spiritual aspects of materialism such as beauty and art, that transcend base materialism like wealth. Despite this the Diamonds are recognised as being the Coins suit of the Tarot, with a strong tie to Elemental Earth.</main>
											</section>
											<section id="t13ne-t13tx-183" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-tarot-text-section t13ne-textbox" title="Tarot Text: ">

												Ordeal Types: Travel (e.g. Chase, Race) / Creativity (e.g. Smithing, Painting). Diamonds act as Trump for the following Action Types: Art, Building, Charming, Crafting, Driving, Emoting, Forgiving, Keeping Your Cool, Listening, Meditation, Motion, Prayer, Preparation, Research, Sprinting and Working in general. Any type of action can be prepared with a Diamond.</main>
											</section>
											<section id="t13ne-t13tx-186" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-parry-section t13ne-textbox" title="Parry: ">
												<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-header t13ne-textbox-title">
												Parry: </header>
												<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-footer t13ne-textbox-type">
												Seize the initiative</footer>
												<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-facetname-suit t13ne-facet-suit-suit-parry-section-main t13ne-textbox-description">
												The cards of the original attack (less the matched card) are immediately added to the Defender’s Ordeal Pool. They may then play as many cards as their Descendant/Annex normally plays including the Parry card (1-4) usually into one of their Style Reserve, and then immediately discard any cards over Pool Limit.</main>
											</section>

									Zeal is the Yang Facet of dynamic motion. It is the dominant, active force that drives enthusiasm, ambition and desire. Earnest and eager it is fervour of fanaticism, faith and confidence of belief. Zeal is the only capable of kicking into action its opposite of Inertia.</main>

										<figure class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-figure t13ne-atkicon" title="Energy ">
											<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span">
											⚡</span>
											<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details">
												<summary class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-summary">
												</summary>
												<p class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details-p">
													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-strong">
													Energy </strong>
													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span t13ne-description">
													Energy attacks are blasts of radiation that are not entirely physical in nature. They might still have a physical impact, but the damage is usually radiation, or electrical burns/muscle twitch.</span>
												</p>
											</details>
										</figure>
										<figure class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-figure t13ne-atkicon" title="Physical">
											<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span">
											⚒</span>
											<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details">
												<summary class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-summary">
												</summary>
												<p class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details-p">
													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-strong">
													Physical</strong>
													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span t13ne-description">
													The simplest forms of wounding are nothing but bashing and cutting physical wounds. Physical attacks are usually performed with weapons (Prop Descendants) or Martial Arts Annexes, which means they can be blocked, parried and so on by another weapon or Martial Art.</span>
												</p>
											</details>
										</figure>
										<figure class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-figure t13ne-atkicon" title="Magic">
											<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span">
											⭐</span>
											<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details">
												<summary class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-summary">
												</summary>
												<p class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details-p">
													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-strong">
													Magic</strong>
													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span t13ne-description">
														Magic may just be technology we don't understand, or it can be a mysterious force unknowable and frightening to the common man. Magic can parry magic, and so <em>
														sometimes</em>
													can silver or cold iron, it depends on the magic. Magic attacks are rarely dodgeable (and the few that are are usually actually spells that perform energy attacks), and usually ignore Range, but instead must pierce the target's Liberty or Wyrd Boon Reduced (-4 Pips as standard).</span>
												</p>
											</details>
										</figure>
										<figure class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-figure t13ne-atkicon" title="Stage">
											<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span">
											🎭</span>
											<details class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details">
												<summary class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-summary">
												</summary>
												<p class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details-p">
													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-strong">
													Stage</strong>
													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span t13ne-description">
													Affects the Stage or the Target's position in it.</span>
												</p>
												<p class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-details-p t13ne-rules">
													<strong class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-strong t13ne-rules">
													Rules: </strong>
													<span class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-attack-text-span t13ne-rules">
													The Rules depend on the attack being used. A Snare Attack creates a Trap in the the Stage of the Ordeal. The Trap may be avoided, by playing a higher card, but it remains as an Obstacle in the Stage. The Snare may be disabled (by beating Twice the Pips + any additional modifiers the Snare may have), or it may injure everyone that enters the Stage. Kick and Yank Attacks move the Target in the Stage, either away or towards the Attacker, by a Range equal to the Total Pips Reduced.</span>
												</p>
											</details>
										</figure>
									</main>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-footer t13ne-attack-footer">
									Kick attacks can be any Type but Economic. Regardless of type they have the same effect. Kicks move your opponent away from you (usually).</footer>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-attack-modes">
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-core">
								<section id="t13ne-t13tx-190" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-core-text-section t13ne-textbox" title="Core">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-core-text-section-header t13ne-textbox-title">
									Core</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-core-text-section-footer t13ne-textbox-type">
									Meddler</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-core-text-section-main t13ne-textbox-description">
									Character can store and usually has an additional point of Twist (whether they can gain Twists or not). Normally the character would be restricted to the number of Hitches that they had and require a Dæmonic Hitch or Annex to generate Twists. The extra Twist will naturally regenerate once a Scene.</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-descendants">
								<section id="t13ne-t13tx-191" class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-descendants-text-section t13ne-textbox" title="Descendants">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-descendants-text-section-header t13ne-textbox-title">
									Descendants</header>
									<footer class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-descendants-text-section-footer t13ne-textbox-type">
									Engine</footer>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-descendants-text-section-main t13ne-textbox-description">
									Zeal Descendants are known as engines, and while that does mean the mechanical type (and includes vehicles), it also encapsulates engines of belief such as political philosophies and religions too. Most religions can be defined as an Engine Descendant driving the Character to better themselves in some way.</main>
								</section>
							</li>

									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">

											<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-emotion-negative-list-item">

										</ol>
									</main>
								</section>
							</li>
							<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-li t13ne-emotion-positive">
								<section class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section t13ne-textbox" title="Emotion Positive">
									<header class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-header t13ne-textbox-title">
									Emotion Positive</header>
									<main class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect-section-main t13ne-textbox-description">
										<ol class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-emotion-positive-list">

											<li class="t13ne-card-figure draggable t13ne-card t13ne-cardwrap-jsvg-facets t13ne-facets-facet-aspect t13ne-facet-aspect t13ne-zeal t13ne-emotion-positive-list-item">

									</main>
