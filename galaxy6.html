// Simple deterministic pseudo-random number generator (PRNG) (from galaxy3.html)
function mulberry32(a) {
    return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296; // Corrected to use 4294967296 for 0-1 float
    }
}

// Noise implementation (from galaxy2.html)
class NoiseGenerator {
    constructor(seed = 12345) {
        this.seed = seed;
    }

    hash(args) {
        let h = this.seed;
        for (let i = 0; i < args.length; i++) {
            h = Math.imul(h ^ args[i], 1597334677);
            h = (h << 13) | (h >>> 19);
        }
        return function() {
            h = Math.imul(h ^ (h >>> 16), 2246822507);
            h = Math.imul(h ^ (h >>> 13), 3266489909);
            return (h >>> 0) / 4294967296;
        }();
    }

    noise2D(x, y, scale = 1) {
        x *= scale; y *= scale;
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = x - ix;
        const fy = y - iy;
        const a = this.hash([ix, iy]);
        const b = this.hash([ix + 1, iy]);
        const c = this.hash([ix, iy + 1]);
        const d = this.hash([ix + 1, iy + 1]);
        const u = fx * fx * (3 - 2 * fx);
        const v = fy * fy * (3 - 2 * fy);
        return (a * (1 - u) + b * u) * (1 - v) + (c * (1 - u) + d * u) * v;
    }
}

Galaxy.getDracoClanName = function(n1, n2) {

    return `${base} ${suffix}`;
};

Galaxy.getKathorriDesignation = function(n1, n2) {

    const suffixIndex = Math.floor(n2 * KATHORRI_FLUIDIC_SUFFIX.length);

    const suffix = KATHORRI_FLUIDIC_SUFFIX[suffixIndex % KATHORRI_FLUIDIC_SUFFIX.length];
    return `${prefix} ${suffix}`;
};

Galaxy.getVemlekProtocolName = function(n1, n2, n3) {
    const adjIndex = Math.floor(n1 * VEMLEK_ADJECTIVES.length);
    const conceptIndex = Math.floor(n2 * VEMLEK_CONCEPTS.length);
    const designationIndex = Math.floor(n3 * VEMLEK_DESIGNATION.length);

    const concept = VEMLEK_CONCEPTS[conceptIndex % VEMLEK_CONCEPTS.length];
    const designation = VEMLEK_DESIGNATION[designationIndex % VEMLEK_DESIGNATION.length];
    return `${adj} ${concept} (${designation})`;
};

Galaxy.getProceduralLatinName = function(n1, n2) {

    const prefix = LATIN_PREFIXES[prefixIndex % LATIN_PREFIXES.length];

};

Galaxy.getTheriosCommonName = function(n1, n2) {
    const adjIndex = Math.floor(n1 * THERIOS_COMMON_ADJECTIVES.length);
    const nounIndex = Math.floor(n2 * THERIOS_COMMON_NOUNS.length);

    const noun = THERIOS_COMMON_NOUNS[nounIndex % THERIOS_COMMON_NOUNS.length];

Galaxy.generateSpeciesVariant = function(speciesKey, n1, n2, n3, n4) {
    const variantData = {
        latinName: null,
        speciesName: SPECIES_LORE[speciesKey].name,
        descriptionAddendum: '',
        societyTypeOverride: null
    };

    switch (speciesKey) {
        case 'Therios':
            const animalBaseIndex = Math.floor(n1 * ANIMAL_BASES.length);
            const animalBase = ANIMAL_BASES[animalBaseIndex % ANIMAL_BASES.length];
            const commonName = this.getTheriosCommonName(n2, n3);
            const baseLatin = ANIMAL_TO_LATIN_MAPPING[animalBase] || 'Species Incognita';
            const secondaryLatin = LATIN_SUFFIXES[Math.floor(n4 * LATIN_SUFFIXES.length) % LATIN_SUFFIXES.length];
            variantData.latinName = `${baseLatin} ${secondaryLatin}`;
            variantData.speciesName = `${SPECIES_LORE.Therios.name} (${commonName})`;
            variantData.descriptionAddendum = `This system is inhabited by the ${commonName} strain, a variant derived from ${animalBase} genetics. Scientific Designation: ${variantData.latinName}.`;
            break;
        case 'Draco':
            const dracoClan = this.getDracoClanName(n1, n2);
            variantData.latinName = this.getProceduralLatinName(n3, n4);
            variantData.speciesName = `${SPECIES_LORE.Draco.name} (${dracoClan})`;
            variantData.descriptionAddendum = `This system is under the governance of the ${dracoClan}. Their social structure focuses on ancient reptilian lineage and inherited roles. Scientific Designation: ${variantData.latinName}.`;
            variantData.societyTypeOverride = dracoClan; // Use clan name as society
            break;
        case 'Kathorri':
            const designation = this.getKathorriDesignation(n1, n2);
            variantData.latinName = this.getProceduralLatinName(n3, n4);
            variantData.speciesName = `${SPECIES_LORE.Kathorri.name} (${designation})`;
            variantData.descriptionAddendum = `This system is a node in the ${designation} network. They specialize in super-conductive infrastructure and deep-cold environments. Scientific Designation: ${variantData.latinName}.`;
            variantData.societyTypeOverride = designation;
            break;
        case 'Vemlek':
            const protocolName = this.getVemlekProtocolName(n1, n2, n3);
            variantData.latinName = this.getProceduralLatinName(n4, n4);
            variantData.speciesName = `${SPECIES_LORE.Vemlek.name} (${protocolName})`;
            variantData.descriptionAddendum = `The system is run by the ${protocolName}, a faction whose philosophical commitment dictates the volatile system management. Scientific Designation: ${variantData.latinName}.`;
            variantData.societyTypeOverride = protocolName.split('(')[0].trim();
            break;
    }
    return variantData;
};

    const rand = mulberry32(systemSeed);
    const n1 = rand(); 
    const n2 = rand();
    const n3 = rand();
    const n4 = rand();

    let speciesKey;
    if (r < 0.1 || zRatio > 0.1) { // Core/Halo priority
        if (zRatio > 0.2 && !star.isYoung) { speciesKey = 'FirstRelic'; } 
        else if (n1 < 0.5) { speciesKey = 'Draco'; } 
        else { speciesKey = 'Humans'; }
    } else if (r > 0.6 || zRatio > 0.03) { // Outer disk priority
        if (n3 > 0.7 && zRatio > 0.03) { speciesKey = (n1 < 0.5) ? 'Kathorri' : 'ThfThf'; } 
        else { speciesKey = 'Therios'; }
    } else { // Inner/Mid disk priority
        if (n3 > 0.8) { speciesKey = 'Vemlek'; } 
        else if (n2 < 0.3) { speciesKey = 'Grenk'; } 
        else { speciesKey = 'Humans'; }
    }

    // --- 2. TECH LEVEL & SOCIETY ASSIGNMENT (from galaxy2.html) ---
    let techLevelKey; 
    let baseTech = (1 - r) * 0.4 + n2 * 0.6; // Tech generally decreases with radius
    if (baseTech > 0.8) { techLevelKey = 'T30'; } 
    else if (baseTech > 0.5) { techLevelKey = 'T12'; } 
    else if (baseTech > 0.3) { techLevelKey = 'T6'; } 
    else { techLevelKey = 'T0'; }

    // --- 3. APPLY PROCEDURAL VARIATION AND NARRATIVE GENERATION (from galaxy2.html) ---
    let speciesName = SPECIES_LORE[speciesKey].name;
    let baseDescription = SPECIES_LORE[speciesKey].descOverride || SPECIES_LORE[speciesKey].desc;
    let descriptionAddendum = '';
    let societyType;
    let societyTypeOverride = null;
    let latinName = this.getProceduralLatinName(n1, n2);

    if (SPECIES_LORE[speciesKey].variantType) {
        const variant = this.generateSpeciesVariant(speciesKey, n1, n2, n3, n4);
        speciesName = variant.speciesName;
        descriptionAddendum = variant.descriptionAddendum;
        societyTypeOverride = variant.societyTypeOverride;
        latinName = variant.latinName;
    }

    let techLevel = TECH_LEVELS[techLevelKey];
    
    // Choose society type based on location/tech, overridden by variant
    const societyIndex = Math.floor(n3 * SOCIETY_TYPES.length);
    societyType = societyTypeOverride || SOCIETY_TYPES[societyIndex % SOCIETY_TYPES.length];

    let description = `${baseDescription} ${descriptionAddendum}`;
    
    // Simple System Name Generation (from galaxy2.html)
    const prefixes = ["xylon", "draco", "krypt", "aethel", "therios", "vectra", "solaris", "noxis", "cygni", "aether", "umbra", "terra", "prime", "nexus", "beta", "gamma", "draconis", "canis", "aquila", "lux", "minor", "solis", "aether", "umbra", "vulc"];
    const suffixes = ["on", "us", "ar", "prime", "major", "ex", "nexus", "b-VII", "sigma", "terra", "k-12", "alpha", "beta", "gamma", "draconis", "canis", "aquila", "lux", "minor", "solis", "aether", "umbra", "vulc"]; 
    const n1_name = Math.floor(n1 * prefixes.length);
    const n2_name = Math.floor(n2 * suffixes.length);
    const name = prefixes[n1_name % prefixes.length] + suffixes[n2_name % suffixes.length];

    const baseResult = {
        name: name,
        starClass: star.starClass,
        tech: techLevel, // Use the full string name
        species: speciesName,
        society: societyType,
        description: description,
        coords: `${Math.round(star.x)}, ${Math.round(star.y)}, ${Math.round(star.z)}`
    };

    // --- 4. NEW: PLANET GENERATION LOGIC (from galaxy3.html) ---
    const planetRand = mulberry32(systemSeed + 1); // Secondary seed for planets
    const planetNoise = rand(); // Use a noise value for planet type/description variation

    const planets = [];
    let numPlanets = 0;
    // T0 systems are less likely to have detailed/many planets
    if (techLevelKey === 'T0') { 
        numPlanets = Math.floor(planetRand() * 3) + 1; // 1 to 3 planets
    } else {
        numPlanets = Math.floor(planetRand() * 5) + 3; // 3 to 7 planets
    }

    const planetTypes = ['Terran', 'Gas Giant', 'Ice World', 'Ocean World', 'Desert Planet', 'Barren Rock'];
    const systemName = baseResult.name;

    for (let i = 0; i < numPlanets; i++) {
        const planetType = planetTypes[Math.floor(planetRand() * planetTypes.length)];
        let planetDescription = `A standard ${planetType} in the ${systemName} system.`;
        
        // Simple procedural description addition from galaxy3
        if (planetType === 'Gas Giant') {
            planetDescription = 'A colossal gas giant, likely a source of exotic atmospheric elements and rare isotopes.';
        } else if (planetType === 'Terran' && techLevelKey !== 'T0') {
            planetDescription = `The primary habitable world of the system, home to the dominant species, ${baseResult.species}.`;
        } else if (planetType === 'Ice World') {
            planetDescription = 'A frozen sphere with cryovolcanism, a major source of water ice and volatile compounds.';
        }

        planets.push({
            name: `${systemName.split(' ')[0].replace(/[^a-zA-Z0-9]/g, '')}-${i + 1}`,
            type: planetType,
            description: planetDescription,
            orbitalRadius: 1 + i * 0.5 + planetRand() * 0.2, // Relative radius for 2D map
            size: 0.2 + planetNoise * 0.3 // Relative size for 2D map
        });
    }

    // --- FINAL RETURN: COMBINE LORE AND PLANETS ---
    return { ...baseResult, planets: planets };
};

Galaxy.initSpriteTextures = function() {
    // Generates a soft, circular texture for the star particles (from galaxy3.html)
    function createStarTexture() {
        const size = 64;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); 
        gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.5)'); 
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(canvas);
    }
    
    // Creates a cross shape (from galaxy2.html for sharper center stars)
    function createCrossTexture(size = 64) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext('2d');
        context.strokeStyle = 'white';
        context.lineWidth = size / 8;
        context.beginPath();
        context.moveTo(size / 4, size / 2);
        context.lineTo(size * 3 / 4, size / 2);
        context.moveTo(size / 2, size / 4);
        context.lineTo(size / 2, size * 3 / 4);
        context.stroke();
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        return texture;
    }
    
    // Creates a radial glow for nebulas (from galaxy2.html)
    function createRadialGradientTexture(size = 128) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
        gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(canvas);
    }

    // These properties are now correctly assigned to the initialized Galaxy.spriteTextures object
    this.spriteTextures.soft = createStarTexture();
    this.spriteTextures.cross = createCrossTexture();
    this.spriteTextures.radial = createRadialGradientTexture();
};

Galaxy.getStarColorAndClass = function(isYoung, rNorm, densityFactor) {
    // Star color palette (from galaxy2.html)
    const starColors = [
        new THREE.Color(0xFF8844), // M-class (Red, cool)
        new THREE.Color(0xFFB888), // K-class (Orange)
        new THREE.Color(0xFFFF88), // G-class (Yellow, Sun-like)
        new THREE.Color(0x88FFFF), // F/A-class (White/Blue-White)
        new THREE.Color(0x8888FF), // B-class (Blue)
        new THREE.Color(0xBB88FF) // O-class (Violet-Blue, hottest)
    ];
    const starClasses = ['M', 'K', 'G', 'F/A', 'B', 'O'];
    
    // Star type determined by radius (rarer/hotter stars in arms and center)
    // Noise is introduced to simulate local variations (from galaxy2.html)
    const noise = noiseGen.noise2D(rNorm * 10, rNorm * 10, 1.0); 
    let colorIndex = Math.floor((1 - rNorm * 0.7 + densityFactor * 0.2 + noise * 0.5) * 4); // Logic adapted from galaxy2.html
    
    if (isYoung) {
        colorIndex = Math.min(5, colorIndex + 1); // Young stars skew hotter/bluer
    }
    colorIndex = Math.min(starColors.length - 1, Math.max(0, colorIndex));

    return {
        color: starColors[colorIndex],
        starClass: starClasses[colorIndex] + ((Math.random() > 0.5) ? ' Main Sequence' : ' Giant')
    };
};

// Core Galaxy Generation (from galaxy2.html)
Galaxy.generateStars = function() {
    this.stars = [];
    this.starMap.clear();

    const starCount = Galaxy.params.starCount;
    const galaxyRadius = Galaxy.params.galaxyRadius;
    const armCount = Galaxy.params.armCount;
    const winding = Galaxy.params.winding;
    const lag = Galaxy.params.lag;
    const densityMultiplier = Galaxy.params.densityMultiplier;

    // Calculate component ratios
    let HALO_RATIO = Galaxy.params.haloRatio;
    let BULGE_RATIO = Galaxy.params.bulgeRatio;
    let DISC_RATIO = 1.0 - HALO_RATIO - BULGE_RATIO; 
    if (DISC_RATIO <= 0) { HALO_RATIO = 0.01; BULGE_RATIO = 0.01; DISC_RATIO = 0.98; }
    
    const haloCount = Math.floor(starCount * HALO_RATIO);
    const bulgeCount = Math.floor(starCount * BULGE_RATIO);
    const discCount = starCount - haloCount - bulgeCount;
    
    // --- Halo stars ---
    for (let i = 0; i < haloCount; i++) {
        const isYoung = false;
        const rNorm = Math.pow(Math.random(), 0.3);
        const r = rNorm * galaxyRadius * 1.5;
        const phi_halo = Math.random() * Math.PI * 2;
        const theta_halo = Math.acos(Math.random() * 2 - 1);
        const x = r * Math.sin(theta_halo) * Math.cos(phi_halo);
        const y = r * Math.sin(theta_halo) * Math.sin(phi_halo);
        const z = r * Math.cos(theta_halo);
        const theta = Math.atan2(y, x);
        const starDetails = this.getStarColorAndClass(isYoung, rNorm, 0.4);
        this.stars.push({ x, y, z, r: rNorm, angle: theta, isYoung, color: starDetails.color, starClass: starDetails.starClass, size: 2 });
    }

    // --- Bulge stars ---
    for (let i = 0; i < bulgeCount; i++) {
        const isYoung = Math.random() < 0.2;
        const rNorm = Math.random() * BULGE_RATIO * 2;
        const r = rNorm * galaxyRadius;
        const theta = Math.random() * Math.PI * 2;
        const x = r * Math.cos(theta);
        const y = r * Math.sin(theta);
        const zThickness = galaxyRadius * BULGE_RATIO * 0.5;
        const z = (Math.random() * 2 - 1) * zThickness;
        const starDetails = this.getStarColorAndClass(isYoung, rNorm, 1.0);
        this.stars.push({ x, y, z, r: rNorm, angle: theta, isYoung, color: starDetails.color, starClass: starDetails.starClass, size: 2.5 });
    }

    // --- Disc/Arm stars ---
    for (let i = 0; i < discCount; i++) {
        const rNorm = Math.pow(Math.random(), 1.5) * DISC_RATIO + BULGE_RATIO;
        let r = rNorm * galaxyRadius;
        let theta = Math.random() * Math.PI * 2; 

        // Logarithmic Spiral Arms Calculation (from galaxy2.html)
        let armAngle = Math.atan2(Math.sin(theta), Math.cos(theta));
        let closestArm = Infinity;
        
        for (let j = 0; j < armCount; j++) {
            const armOffset = (j / armCount) * Math.PI * 2;
            const idealArmTheta = (Math.log(r / galaxyRadius) / (-winding)) + armOffset; 
            
            // Normalize angular distance
            let angularDistance = idealArmTheta - armAngle;
            while (angularDistance > Math.PI) angularDistance -= Math.PI * 2;
            while (angularDistance < -Math.PI) angularDistance += Math.PI * 2;
            closestArm = Math.min(closestArm, Math.abs(angularDistance));
        }

        // Density Wave Lag and Scatter (from galaxy2.html)
        const densityWaveTheta = (Math.log(r / galaxyRadius) / (-winding)) + lag;
        const armDensityDistance = Math.abs(densityWaveTheta - armAngle);

        const armHalfWidthRad = 0.2;
        const densityProbability = Math.max(0, 1.0 - (armDensityDistance / armHalfWidthRad)) * densityMultiplier;

        if (Math.random() < densityProbability) {
            // Star is in an arm/density wave
            let scatter = (Math.random() - 0.5) * armHalfWidthRad * 0.5;
            let isYoung = Math.random() < (1 - rNorm) * 0.5;
            if (isYoung) { scatter *= (1.0 - lag * 0.1); } else { isYoung = false; scatter *= 0.8; }
            theta += scatter;
        } else {
            // Field star - more scattered
            theta += (Math.random() - 0.5) * Math.PI * 0.1; 
        }

        // Star position
        const x = r * Math.cos(theta);
        const y = r * Math.sin(theta);
        const zThickness = galaxyRadius * 0.04;
        const z = (Math.random() - 0.5) * zThickness * (1 - rNorm);
        
        const starDetails = this.getStarColorAndClass(Math.random() < 0.1, rNorm, densityProbability);
        this.stars.push({ x, y, z, r: rNorm, angle: theta, isYoung: starDetails.isYoung, color: starDetails.color, starClass: starDetails.starClass, size: 2 });
    }
    
    this.renderPoints();
    this.addNebulaAndDust();
    this.renderNebulaGlow();
    
    // Map the system data to the star index for fast lookup during selection
    this.stars.forEach((star, index) => {
        const data = this.getSystemDetails(star); // Generate lore and planets
        this.starMap.set(index, data);
    });
};

Galaxy.renderPoints = function() {
    if (this.points) this.scene.remove(this.points);
    const vertices = [];
    const colors = [];
    const sizes = [];
    this.stars.forEach(star => {
        vertices.push(star.x, star.y, star.z);
        colors.push(star.color.r, star.color.g, star.color.b);
        sizes.push(star.size);
    });
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
    const material = new THREE.PointsMaterial({
        size: 5,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        map: this.spriteTextures.cross,
        sizeAttenuation: true
    });
    this.points = new THREE.Points(geometry, material);
    this.scene.add(this.points);
    this.starMaterial = material;
};

Galaxy.addNebulaAndDust = function() {
    if (this.gasMeshes.length > 0) {
        this.gasMeshes.forEach(m => this.scene.remove(m));
        this.gasMeshes = [];
    }

    // 1. CRITICAL FIX: Robustly define the array of colors.
    // This ensures that 'safeNebulaColors' is ALWAYS a non-empty array,
    // eliminating the possibility of accessing '.length' on 'undefined'.
    const safeNebulaColors = (Galaxy.params && Array.isArray(Galaxy.params.NEBULA_COLORS) && Galaxy.params.NEBULA_COLORS.length > 0) ?
        Galaxy.params.NEBULA_COLORS :
        [new THREE.Color(0xFFFFFF)]; // Fallback to a single white color if params/array is missing/empty

    const galaxyRadius = Galaxy.params.galaxyRadius; 
    const numNebulae = 30; 
    const noiseScale = 0.005; 
    const colorIndices = [];
    
    const colorCount = safeNebulaColors.length; // Now guaranteed to be >= 1

    for(let i=0; i<numNebulae; i++) {
        // This is safe, as colorCount is >= 1
        colorIndices.push(Math.floor(Math.random() * colorCount));
    }

    // Add Nebulae Sprites (from galaxy2.html)
    for (let i = 0; i < numNebulae; i++) {
        const r = Math.pow(Math.random(), 1.5) * galaxyRadius;
        let t = Math.random() * Math.PI * 2;
        
        const x = r * Math.cos(t);
        const y = r * Math.sin(t);
        const z = (Math.random() - 0.5) * galaxyRadius * 0.05 * (1 - r / galaxyRadius);

        const clusterNoise = noiseGen.noise2D(x * noiseScale, y * noiseScale, 1.0);
        if (clusterNoise < 0.4) continue;

        // Use the safely retrieved color
        const color = safeNebulaColors[colorIndices[i]];
        
        const material = new THREE.SpriteMaterial({
            map: this.spriteTextures.radial,
            color: color,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.15
        });
        const sprite = new THREE.Sprite(material);
        const spriteSize = (Math.random() * 500) + 200;
        sprite.scale.set(spriteSize, spriteSize, 1);
        sprite.position.set(x, y, z);
        this.gasMeshes.push(sprite);
        this.scene.add(sprite);
    }
};

Galaxy.renderNebulaGlow = function() {
    // Large, faint central glow (from galaxy2.html)
    const CORE_GLOW_RADIUS = this.params.galaxyRadius * 0.3;
    const CORE_COLOR = new THREE.Color(0xFFCCAA);
    const material = new THREE.SpriteMaterial({
        map: this.spriteTextures.soft,
        color: CORE_COLOR,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.2
    });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(CORE_GLOW_RADIUS * 2, CORE_GLOW_RADIUS * 2, 1);
    sprite.position.set(0, 0, 0);
    this.gasMeshes.push(sprite);
    this.scene.add(sprite);
};

// Function to draw the 2D visualization of the selected star system
function drawSystemMap(planets) {
    const canvas = document.getElementById('system-map-canvas');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    ctx.clearRect(0, 0, width, height);

    const centerX = width / 2;
    const centerY = height / 2;
    const starRadius = 10;
    const maxOrbitalRadius = 50; // Max radius for the planet map visualization

    // Draw the central star
    ctx.beginPath();
    // Gradient for a solar flare effect
    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, starRadius);
    gradient.addColorStop(0, 'rgba(255, 255, 100, 1)');
    gradient.addColorStop(1, 'rgba(255, 150, 50, 0.5)');
    ctx.arc(centerX, centerY, starRadius, 0, 2 * Math.PI);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.closePath();

    // Draw the orbits and planets
    planets.forEach(planet => {
        // Draw Orbit
        ctx.beginPath();
        const orbitRadius = maxOrbitalRadius + (planet.orbitalRadius * 15);
        ctx.arc(centerX, centerY, orbitRadius, 0, 2 * Math.PI);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Calculate planet position on its orbit (simple constant angle for visualization)
        const planetAngle = 1.2; // Fixed angle for consistent look
        const planetX = centerX + orbitRadius * Math.cos(planetAngle);
        const planetY = centerY + orbitRadius * Math.sin(planetAngle);

        // Determine color based on type
        let planetColor = '#e0e0e0';
        switch (planet.type) {
            case 'Terran': planetColor = '#4CAF50'; break; // Green
            case 'Gas Giant': planetColor = '#FF9800'; break; // Orange
            case 'Ice World': planetColor = '#90CAF9'; break; // Light Blue
            case 'Ocean World': planetColor = '#2196F3'; break; // Deep Blue
            case 'Desert Planet': planetColor = '#FFC107'; break; // Yellow
            case 'Barren Rock': planetColor = '#795548'; break; // Brown
        }

        // Draw Planet
        ctx.beginPath();
        const planetDisplaySize = Math.max(2, planet.size * 5);
        ctx.arc(planetX, planetY, planetDisplaySize, 0, 2 * Math.PI);
        ctx.fillStyle = planetColor;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    });
}

// camera, renderer, raycaster, container, and mouseVector are already declared globally at the top.
const center = new THREE.Vector3(0, 0, 0);
let radius = 4000;
let phi = Math.PI * 0.5;
let theta = 0;

function updateCameraPosition() {
    // Convert spherical coordinates (radius, phi, theta) to cartesian
    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    camera.position.set(x, y, z);
    camera.lookAt(center);
}

function init3D() {
    container = document.getElementById('container');
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
    
    // Initial camera position setup
    updateCameraPosition();
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    Galaxy.scene = scene;
    Galaxy.initSpriteTextures(); // Initialize textures
    
    raycaster = new THREE.Raycaster();
    mouseVector = new THREE.Vector2(); // Initialization, declared globally

    Galaxy.generateStars(); // Initial generation

    // Event Listeners
    window.addEventListener('resize', onWindowResize, false);
    document.addEventListener('mousedown', onMouseDown, false);
    document.addEventListener('mousemove', onMouseMove, false);
    document.addEventListener('mouseup', onMouseUp, false);
    document.addEventListener('wheel', onMouseWheel, false);
    document.addEventListener('click', onClick, false);
    
    // Touch event listeners for mobile devices
    document.addEventListener('touchstart', onTouchStart, false);
    document.addEventListener('touchmove', onTouchMove, false);
    document.addEventListener('touchend', onTouchEnd, false);
    
    // Controls UI setup
    updateUIValues();
    document.getElementById('btn-regen').addEventListener('click', () => {
        Galaxy.generateStars();
    });
    
    setupControlsListeners();

    animate();
}

function setupControlsListeners() {
    const params = Galaxy.params;
    const update = () => { Galaxy.generateStars(); updateUIValues(); };

    document.getElementById('param-arm-count').addEventListener('input', (e) => { params.armCount = parseInt(e.target.value); updateUIValues(); });
    document.getElementById('param-arm-count').addEventListener('mouseup', update);

    document.getElementById('param-density').addEventListener('input', (e) => { params.densityMultiplier = parseFloat(e.target.value); updateUIValues(); });
    document.getElementById('param-density').addEventListener('mouseup', update);

    document.getElementById('param-winding').addEventListener('input', (e) => { params.winding = parseFloat(e.target.value); updateUIValues(); });
    document.getElementById('param-winding').addEventListener('mouseup', update);

    document.getElementById('param-halo-ratio').addEventListener('input', (e) => { params.haloRatio = parseFloat(e.target.value); updateUIValues(); });
    document.getElementById('param-halo-ratio').addEventListener('mouseup', update);

    document.getElementById('param-bulge-ratio').addEventListener('input', (e) => { params.bulgeRatio = parseFloat(e.target.value); updateUIValues(); });
    document.getElementById('param-bulge-ratio').addEventListener('mouseup', update);

    document.getElementById('param-lag').addEventListener('input', (e) => { params.lag = parseFloat(e.target.value); updateUIValues(); });
    document.getElementById('param-lag').addEventListener('mouseup', update);
}

function updateUIValues() {
    document.getElementById('param-arm-count').value = Galaxy.params.armCount;
    document.getElementById('val-arm-count').textContent = Galaxy.params.armCount;

    document.getElementById('param-density').value = Galaxy.params.densityMultiplier;
    document.getElementById('val-density').textContent = Galaxy.params.densityMultiplier.toFixed(1);

    document.getElementById('param-winding').value = Galaxy.params.winding;
    document.getElementById('val-winding').textContent = Galaxy.params.winding.toFixed(1);

    document.getElementById('param-halo-ratio').value = Galaxy.params.haloRatio;
    document.getElementById('val-halo-ratio').textContent = Galaxy.params.haloRatio.toFixed(1);

    document.getElementById('param-bulge-ratio').value = Galaxy.params.bulgeRatio;
    document.getElementById('val-bulge-ratio').textContent = Galaxy.params.bulgeRatio.toFixed(1);

    document.getElementById('param-lag').value = Galaxy.params.lag;
    document.getElementById('val-lag').textContent = Galaxy.params.lag.toFixed(1);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Mouse controls (simplified from galaxy2.html/galaxy3.html)

function onMouseDown(event) {
    if (event.button !== 0) return; // Only left mouse button
    controls.isDragging = true;
    controls.previousMousePosition.x = event.clientX;
    controls.previousMousePosition.y = event.clientY;
    renderer.domElement.style.cursor = 'grabbing';
}

function onMouseMove(event) {
    event.preventDefault();
    mouseVector.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouseVector.y = -(event.clientY / window.innerHeight) * 2 + 1;

    if (controls.isDragging) {
        const deltaX = event.clientX - controls.previousMousePosition.x;
        const deltaY = event.clientY - controls.previousMousePosition.y;

        // Apply rotation (horizontal: change theta, vertical: change phi)
        theta -= deltaX * controls.rotationSpeed;
        phi += deltaY * controls.rotationSpeed;

        // Clamp phi to prevent flip-over (0 to PI)
        phi = Math.max(0.01, Math.min(Math.PI - 0.01, phi));

        controls.previousMousePosition.x = event.clientX;
        controls.previousMousePosition.y = event.clientY;
        
        updateCameraPosition();
    } else {
        checkIntersection();
    }
}

function onMouseUp() {
    controls.isDragging = false;
    renderer.domElement.style.cursor = 'grab';
}

function onMouseWheel(event) {
    event.preventDefault();
    radius += event.deltaY * 10;
    radius = Math.max(500, Math.min(6000, radius));
    updateCameraPosition();
}

function onClick(event) {
    if (controls.isDragging) return;
    
    // Only check intersection if the click didn't start a drag
    if (INTERSECTED !== null) {
        const starData = Galaxy.starMap.get(INTERSECTED);
        Galaxy.showSystemDetails(starData);
    }
}

// Touch controls (simplified from galaxy3.html)

function onTouchStart(event) {
    event.preventDefault();
    if (event.touches.length === 1) { 
        controls.isDragging = true;
        controls.previousMousePosition = { x: event.touches[0].clientX, y: event.touches[0].clientY };
    } else if (event.touches.length === 2) {
        const t1 = event.touches[0];
        const t2 = event.touches[1];
        controls.initialTouchDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        controls.isDragging = false;
    }
}

function onTouchMove(event) {
    event.preventDefault();
    if (event.touches.length === 1 && controls.isDragging) { 
        const touch = event.touches[0];
        const deltaX = touch.clientX - controls.previousMousePosition.x;
        const deltaY = touch.clientY - controls.previousMousePosition.y;

        theta -= deltaX * controls.rotationSpeed * 1.5;
        phi += deltaY * controls.rotationSpeed * 1.5;
        phi = Math.max(0.01, Math.min(Math.PI - 0.01, phi));
        
        controls.previousMousePosition.x = touch.clientX;
        controls.previousMousePosition.y = touch.clientY;
        updateCameraPosition();

    } else if (event.touches.length === 2 && controls.initialTouchDistance !== null) {
        const t1 = event.touches[0];
        const t2 = event.touches[1];
        const currentDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        const distanceChange = controls.initialTouchDistance - currentDistance;

        radius += distanceChange * 5;
        radius = Math.max(500, Math.min(6000, radius));
        controls.initialTouchDistance = currentDistance;
        updateCameraPosition();
    }
}

function onTouchEnd(event) {
    controls.isDragging = false;
    controls.initialTouchDistance = null;
    
    // Simulate a click on touch end if a drag did not occur
    if (event.changedTouches.length === 1 && INTERSECTED !== null) {
        const starData = Galaxy.starMap.get(INTERSECTED);
        Galaxy.showSystemDetails(starData);
    }
}


function checkIntersection() {
    if (!Galaxy.points) return;
    raycaster.setFromCamera(mouseVector, camera);
    const intersects = raycaster.intersectObject(Galaxy.points);

    if (intersects.length > 0) {
        if (INTERSECTED != intersects[0].index) {
            INTERSECTED = intersects[0].index;
            renderer.domElement.style.cursor = 'pointer';
        }
    } else {
        if (INTERSECTED !== null) {
            INTERSECTED = null;
        }
        renderer.domElement.style.cursor = controls.isDragging ? 'grabbing' : 'grab';
    }
}

function animate() {
    requestAnimationFrame(animate);
    
    if (!controls.isDragging) {
        checkIntersection();
    }
    
    renderer.render(scene, camera);
}

init3D();
</script>
