<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Procedural Density Wave Galaxy (V4 - Gaussian Height Profile)</title>
    <!-- Load Three.js library for 3D rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* General page reset and background style */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* Deep space background */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container for UI panels to manage layout */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Important: Allows mouse events to pass through to the canvas by default */
            pointer-events: none; 
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10; /* Ensure UI is above the 3D canvas */
        }
        
        /* General panel styling for controls and details */
        .panel {
            background: rgba(20, 25, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            width: 350px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            /* Re-enable interaction for the panel content itself */
            pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        
        /* Responsive adjustments for controls panel on small screens */
        @media (max-width: 768px) {
            #ui-container {
                flex-direction: column;
                align-items: center;
                padding: 10px;
            }
            .panel {
                width: 95vw;
                margin-bottom: 10px;
            }
            /* Move controls to the bottom on mobile to prioritize screen space for the view */
            #controls {
                order: 2; 
            }
            #system-details {
                order: 1; 
                position: relative;
                top: 0;
                right: 0;
            }
        }

        .panel h2 {
            margin-top: 0;
            color: #4CAF50; /* Accent color for headings */
            font-size: 1.25rem;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        /* Input and label styling */
        label {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Styling for the range sliders */
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: #222;
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }

        /* System Details Panel Specifics */
        #system-details {
            display: none; /* Hidden by default */
            position: absolute;
            top: 20px;
            right: 20px;
            width: 450px;
            max-width: 90vw;
        }

        #close-details {
            float: right;
            cursor: pointer;
            color: #f44336;
            font-size: 1.5rem;
            line-height: 1;
            margin-top: -5px;
        }

        /* Container for the 2D visualization canvas */
        #system-map-container {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .data-label {
            color: #888;
            font-size: 0.85rem;
        }
        .data-value {
            color: #e0e0e0;
            margin-bottom: 10px;
        }
        
        .planet-card {
            background: rgba(30, 40, 50, 0.7);
            border-left: 3px solid #4CAF50;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .planet-card h3 {
            margin: 0 0 5px 0;
            color: #64DD17;
            font-size: 1rem;
        }
        .planet-card p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #ccc;
        }

    </style>
</head>
<body>

<!-- UI elements overlay the canvas -->
<div id="ui-container">
    <!-- Controls Panel (Left) -->
    <div id="controls" class="panel">
        <h2>Galaxy Parameters</h2>

        <!-- Sliders with corresponding display spans for current values -->
        <label for="param-arm-count">Spiral Arms: <span id="val-arm-count"></span></label>
        <input type="range" id="param-arm-count" min="2" max="6" value="4">

        <label for="param-density">Arm Density: <span id="val-density"></span></label>
        <input type="range" id="param-density" min="0.5" max="3.0" step="0.1" value="1.5">
        
        <label for="param-winding">Arm Winding: <span id="val-winding"></span></label>
        <input type="range" id="param-winding" min="0.5" max="5.0" step="0.1" value="2.0">

        <label for="param-halo-ratio">Halo Size: <span id="val-halo-ratio"></span></label>
        <input type="range" id="param-halo-ratio" min="0.0" max="1.0" step="0.1" value="0.3">

        <label for="param-bulge-ratio">Bulge Size: <span id="val-bulge-ratio"></span></label>
        <input type="range" id="param-bulge-ratio" min="0.0" max="1.0" step="0.1" value="0.1">

        <label for="param-lag">Arm Lag: <span id="val-lag"></span></label>
        <input type="range" id="param-lag" min="0.0" max="2.0" step="0.1" value="1.5">

        <button onclick="Galaxy.generateStars()" style="margin-top: 15px; padding: 10px; width: 100%; background: #4CAF50; border: none; border-radius: 4px; color: white; cursor: pointer;">
            Re-Generate Galaxy
        </button>
    </div>

    <!-- System Details Panel (Right) -->
    <div id="system-details" class="panel">
        <span id="close-details" onclick="Galaxy.hideSystemDetails()">X</span>
        <h2 id="sys-name">System Name</h2>

        <div id="system-map-container">
            <!-- Canvas to draw the 2D planetary system map visualization -->
            <canvas id="system-map-canvas" width="450" height="150"></canvas>
        </div>

        <!-- Grid layout for main system data -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="data-label">Star Class:</div>
                <div id="sys-class" class="data-value"></div>
            </div>
            <div>
                <div class="data-label">Dominant Species:</div>
                <div id="sys-species" class="data-value"></div>
            </div>
            <div>
                <div class="data-label">Tech Level:</div>
                <div id="sys-tech" class="data-value"></div>
            </div>
            <div>
                <div class="data-label">Society Type:</div>
                <div class="data-value" id="sys-society"></div>
            </div>
        </div>

        <h3 style="margin-top: 15px; color: #aaa;">System Summary</h3>
        <p id="sys-desc" style="font-size: 0.95rem; line-height: 1.4;"></p>

        <h3 style="margin-top: 20px; color: #aaa;">Planetary Lore</h3>
        <div id="planet-details-container">
            <!-- Planet cards will be inserted here dynamically by JavaScript -->
        </div>

    </div>
</div>

<script>
// ====================================================================
// THREE.js Setup and Global Variables
// ====================================================================
let scene, camera, renderer, raycaster;
let mouse = new THREE.Vector2();
let INTERSECTED = null; // Index of the currently hovered star
let Galaxy = {}; // Namespace for all galaxy-related functions and data

// === GALAXY PARAMETERS AND DATA STORAGE ===
Galaxy.stars = [];
// Map links the star's index in the geometry to its procedural lore data
Galaxy.starMap = new Map(); 
Galaxy.params = {
    starCount: 50000, // Reduced target number of stars to 50,000 to reduce clutter
    armCount: 4, // Number of spiral arms
    densityMultiplier: 1.5, // Multiplies the star density in the arms
    winding: 2.0, // Determines how tightly the arms wrap (logarithmic spiral)
    haloRatio: 0.3, // Proportion of stars in the galactic halo
    bulgeRatio: 0.1, // Proportion of stars in the central bulge
    lag: 1.5, // Angular lag applied to the density wave
    radius: 100, // Radius of the galactic disk
    height: 10 // Thickness of the galactic disk
};

// ====================================================================
// PROCEDURAL GENERATION HELPERS
// ====================================================================

// Generates a soft, circular texture for the star particles
function createStarTexture() {
    const size = 64;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const context = canvas.getContext('2d');
    
    // Draw a radial gradient for a soft, circular glow
    const gradient = context.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Full opacity center
    gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.5)'); 
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); // Transparent edge

    context.fillStyle = gradient;
    context.fillRect(0, 0, size, size);

    return new THREE.CanvasTexture(canvas);
}

// Simple deterministic pseudo-random number generator (PRNG)
// Ensures star system details are consistent for a given coordinate
function mulberry32(a) {
    return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 42949696;
    }
}

// Function to generate system-specific lore and planetary data
Galaxy.generateSystemData = function (x, y, z, galacticNoise) {
    // Generate a unique seed based on the star's galactic coordinates
    const seed = Math.floor(x * 1000) + Math.floor(y * 1000) + Math.floor(z * 1000);
    const rand = mulberry32(seed);

    // Star Class determination: O, B, A, F, G, K, M 
    const starClasses = ['O', 'B', 'A', 'F', 'G', 'K', 'M']; 
    // Use the galactic noise (which is a proxy for star temperature/rarity)
    const starTypeNoise = galacticNoise;
    const starClassIndex = Math.floor(starTypeNoise * starClasses.length);
    const starClass = starClasses[Math.min(starClassIndex, starClasses.length - 1)];

    // Lore lists for procedural generation
    const speciesList = ['Atlanteans', 'Cyborg Collective', 'Humans', 'The Kryll Swarm', 'Uninhabited', 'Xenolings'];
    const techList = ['Advanced AI', 'Atomic', 'FTL Capable', 'God-like', 'Industrial', 'Primitive'];
    const societyList = ['Anarchy', 'Corporate State', 'Democratic', 'Feudal', 'Hive Mind', 'Utopian'];

    // Properties are weighted by the galactic density noise (higher density -> more likely to be complex/advanced)
    const densityFactor = (1 + Galaxy.params.densityMultiplier / 2);
    const species = speciesList[Math.floor(rand() * speciesList.length * densityFactor) % speciesList.length];
    const tech = techList[Math.floor(rand() * techList.length * densityFactor) % techList.length];
    const society = societyList[Math.floor(rand() * societyList.length * densityFactor) % societyList.length];

    // Simple System Name Generation
    const prefixes = ['Alpha', 'Beta', 'Delta', 'Epsilon', 'Orion', 'Saga', 'Sol', 'Zeta'];
    const suffixes = ['A', 'B', 'C', 'IV', 'Prime', 'Sector', 'VII'];
    const systemName = `${prefixes[Math.floor(rand() * prefixes.length)]}-${suffixes[Math.floor(rand() * suffixes.length)]} ${Math.floor(rand() * 999)}`;

    let description = `The ${systemName} system orbits a ${starClass}-type star. It is a region influenced by the galactic density wave, leading to `;
    description += `a ${species} presence operating at a ${tech} technology level, organized as a ${society} society.`;

    // Planetary Lore Generation
    const numPlanets = Math.floor(starTypeNoise * 6) + 2; // Generate 2 to 7 planets
    const planets = [];
    const planetTypes = ['Barren Rock', 'Desert Planet', 'Gas Giant', 'Ice World', 'Jungle World', 'Ocean World', 'Terran'];

    for (let i = 0; i < numPlanets; i++) {
        const planetRand = mulberry32(seed + i); 
        const planetNoise = planetRand();
        const planetType = planetTypes[Math.floor(planetNoise * planetTypes.length)];
        
        let planetDescription = `A ${planetType.toLowerCase()} world in the system.`;

        if (starClass === 'O' || starClass === 'B') {
            planetDescription += ' The extreme stellar radiation makes surface life unlikely, favoring subterranean or orbital habitats.';
        } else if (starClass === 'M') {
            planetDescription += ' Orbiting close to this cool red star, the planet experiences tidal locking, creating a harsh dichotomy between the burning sun-side and the frozen night-side.';
        }

        if (planetNoise > 0.7 && species !== 'Uninhabited') {
            planetDescription += ` It is home to significant ${species} colonial infrastructure, likely due to its abundant resources.`;
        } 

        planets.push({
            name: `${systemName.split(' ')[0]}-${i + 1}`,
            type: planetType,
            description: planetDescription,
            orbitalRadius: 1 + i * 0.5 + planetRand() * 0.2, // Relative radius for 2D map
            size: 0.2 + planetNoise * 0.3 // Relative size for 2D map
        });
    }

    return { systemName, starClass, species, tech, society, description, planets };
};

// ====================================================================
// THREE.js SETUP
// ====================================================================

function init() {
    // Scene setup (the main container for all 3D objects)
    scene = new THREE.Scene();
    
    // Camera setup (PerspectiveCamera gives 3D depth)
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = Galaxy.params.radius * 0.8;
    camera.position.y = Galaxy.params.height * 5;
    camera.lookAt(0, 0, 0); // Start by looking at the galactic center

    // Renderer setup (draws the scene onto the canvas)
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    // Raycaster is used for detecting clicks/taps on stars
    raycaster = new THREE.Raycaster();
    
    // Custom controls state for mouse and touch interactions
    controls = {
        isDragging: false,
        previousMousePosition: { x: 0, y: 0 },
        initialTouchDistance: null, // Stores distance between two touch points for pinch zoom
        rotationSpeed: 0.005,
        zoomSpeed: 0.01
    };

    // Add event listeners for mouse interaction
    renderer.domElement.addEventListener('mousemove', onMouseMove, false);
    renderer.domElement.addEventListener('mousedown', onMouseDown, false);
    renderer.domElement.addEventListener('mouseup', onMouseUp, false);
    renderer.domElement.addEventListener('wheel', onMouseWheel, false);
    renderer.domElement.addEventListener('click', onMouseClick, false);

    // Add event listeners for touch interaction (Mobile/Adaptive Controls)
    renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
    renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
    renderer.domElement.addEventListener('touchend', onTouchEnd, false);


    // Window resize handler
    window.addEventListener('resize', onWindowResize, false);
    
    // Initial star generation
    Galaxy.generateStars();
    
    // Initialize UI values to match the default parameters
    updateUIValues();

    // Start rendering loop
    animate();
}

// Function to generate the star points and their geometry
Galaxy.generateStars = function () {
    // Cleanup: Remove old stars if they exist before generating new ones
    if (Galaxy.starMesh) {
        scene.remove(Galaxy.starMesh);
        Galaxy.starMesh.geometry.dispose(); // Free up memory
        Galaxy.starMap.clear();
    }

    const { starCount, radius, height, armCount, winding, lag, haloRatio, bulgeRatio } = Galaxy.params;
    
    // Use dynamic arrays for positions and colors since some stars will be discarded by the density filter
    const positions = []; 
    const colors = [];
    const starDataList = [];

    // Stellar color scheme (maps to star temperature/class)
    const colorScale = [
        new THREE.Color(0xFF8888), // M-class (Red, dim)
        new THREE.Color(0xFFB888), // K-class (Orange)
        new THREE.Color(0xFFFF88), // G-class (Yellow, Sun-like)
        new THREE.Color(0x88FFFF), // F/A-class (White/Blue-White)
        new THREE.Color(0x8888FF), // B-class (Blue)
        new THREE.Color(0xBB88FF)  // O-class (Violet-Blue, hottest)
    ];

    let starsGenerated = 0;
    let attempts = 0;
    const maxAttempts = starCount * 3; // Prevent infinite loop in case of bad params

    while (starsGenerated < starCount && attempts < maxAttempts) {
        attempts++;

        // 1. Generate a potential random star position (Polar coordinates: r, t)
        // Stars are distributed more densely towards the center
        const r = Math.pow(Math.random(), 2.0) * radius; 
        let t = Math.random() * 2 * Math.PI; // Completely random initial angle
        let galacticNoise = Math.random(); // Base noise for star type (temp)

        // 2. Determine star component (Bulge, Halo, or Disk)
        let isBulge = r < radius * bulgeRatio;
        let isHalo = Math.random() < haloRatio;
        let keepStar = true;
        let y_pos; // Height (Y-axis)

        // Using Math.random() - Math.random() creates a triangular distribution,
        // which concentrates stars near the center (Y=0) and eliminates the "bar" effect.
        const centeredRandom = Math.random() - Math.random(); 

        if (isHalo) {
            // Halo: very thick and spread out
            y_pos = centeredRandom * height * 10; 
        } else if (isBulge) {
            // Bulge: thick, but centered
            y_pos = centeredRandom * height * 3; 
        } else {
            // --- 3. Spiral Arm Density Wave Filter for Disk Stars ---
            
            // Disk: Very thin, thickness reduces with radius for a warped/flatter outer disk
            const diskThicknessFactor = 0.5 + 0.5 * (1 - r / radius);
            y_pos = centeredRandom * height * diskThicknessFactor; // Thickness concentrated near mid-plane (Y=0)

            // Calculate the ideal angle of the spiral arms at this radius R
            const idealSpiralAngle = winding * Math.log(r) + lag;
            let minAngularDistance = Math.PI; // Max distance is PI

            // Find angular distance to the closest arm center
            for (let arm = 0; arm < armCount; arm++) {
                const armOffset = arm * (2 * Math.PI / armCount);
                const armAngle = idealSpiralAngle + armOffset;
                
                // Calculate difference (t - armAngle) and normalize it to [-PI, PI]
                let angularDistance = (t - armAngle);
                angularDistance = (angularDistance % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
                if (angularDistance > Math.PI) angularDistance -= 2 * Math.PI;

                minAngularDistance = Math.min(minAngularDistance, Math.abs(angularDistance));
            }
            
            // Normalized distance from the arm center (0 at arm center)
            const armHalfWidthRad = 0.2; 
            const normalizedDistance = Math.min(1.0, minAngularDistance / armHalfWidthRad); 
            
            // Density Probability Filter (Softer inverse square falloff for scattered look)
            // The probability of keeping the star falls off quadratically away from the arm center.
            let densityProbability = (1.0 - normalizedDistance * normalizedDistance) * Galaxy.params.densityMultiplier;
            
            // Apply a slight radial decay to make outer arms fade more
            densityProbability *= (r / radius) * 0.5 + 0.5;

            // Clamp probability between 0 and 1
            const finalProbability = Math.min(1.0, Math.max(0, densityProbability));
            
            // Discard the star if a random roll fails the final probability check
            if (Math.random() > finalProbability) {
                keepStar = false; 
            }
        }
        
        if (keepStar) {
            // Star is accepted: calculate Cartesian coordinates
            const x_pos = r * Math.cos(t);
            const z_pos = r * Math.sin(t);
            
            // Determine star color based on the starTypeNoise (rarer stars are whiter/bluer)
            const starTypeNoise = galacticNoise; 
            let colorIndex;
            if (starTypeNoise > 0.95) colorIndex = 5; // O-class
            else if (starTypeNoise > 0.9) colorIndex = 4; // B-class
            else if (starTypeNoise > 0.8) colorIndex = 3; // A/F-class
            else if (starTypeNoise > 0.6) colorIndex = 2; // G-class (Sun-like)
            else if (starTypeNoise > 0.3) colorIndex = 1; // K-class
            else colorIndex = 0; // M-class

            const starColor = colorScale[colorIndex];
            
            // Populate dynamic arrays
            positions.push(x_pos, y_pos, z_pos);

            colors.push(starColor.r, starColor.g, starColor.b);

            // Generate and store system lore data
            const systemData = Galaxy.generateSystemData(x_pos, y_pos, z_pos, galacticNoise);
            starDataList.push(systemData);

            starsGenerated++;
        }
    }
    
    // Convert dynamic arrays to final Float32Arrays for BufferGeometry
    const finalPositions = new Float32Array(positions);
    const finalColors = new Float32Array(colors);

    // Create the Geometry object to hold position and color data
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(finalPositions, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(finalColors, 3));
    
    // Create the Material for rendering the stars
    Galaxy.starMaterial = new THREE.PointsMaterial({
        size: 0.8,
        vertexColors: true, // Use the colors defined in the geometry
        sizeAttenuation: true, // Stars appear smaller when farther away
        transparent: true,
        map: createStarTexture(), // Use the generated soft-glow texture
        depthWrite: false, // Prevents rendering artifacts with transparency
        blending: THREE.AdditiveBlending // Creates a luminous glow effect
    });

    // Create the Points mesh and add it to the scene
    Galaxy.starMesh = new THREE.Points(geometry, Galaxy.starMaterial);
    scene.add(Galaxy.starMesh);

    // Map the system data to the star index for fast lookup during selection
    starDataList.forEach((data, index) => {
        Galaxy.starMap.set(index, data);
    });
};

// ====================================================================
// INTERACTION & UI FUNCTIONS (UNCHANGED)
// ====================================================================

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- MOUSE HANDLERS ---
function onMouseMove(event) {
    event.preventDefault();
    
    // Normalize mouse coordinates for raycasting (-1 to 1)
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    // Check if dragging (for rotation)
    if (controls.isDragging) {
        const deltaX = event.clientX - controls.previousMousePosition.x;
        const deltaY = event.clientY - controls.previousMousePosition.y;

        // Apply rotation around the center of the galaxy (0, 0, 0)
        const rotationMatrix = new THREE.Matrix4();
        
        // Vertical rotation (pitch) around the X-axis
        rotationMatrix.makeRotationX(deltaY * controls.rotationSpeed);
        camera.position.applyMatrix4(rotationMatrix);
        
        // Horizontal rotation (yaw) around the Y-axis
        rotationMatrix.makeRotationY(deltaX * controls.rotationSpeed);
        camera.position.applyMatrix4(rotationMatrix);

        camera.lookAt(0, 0, 0); // Reorient the camera to face the center

        controls.previousMousePosition = { x: event.clientX, y: event.clientY };
    }
    
    // Check for star hovering to change cursor style
    checkIntersection();
}

function onMouseDown(event) {
    event.preventDefault();
    controls.isDragging = true;
    controls.previousMousePosition = { x: event.clientX, y: event.clientY };
    renderer.domElement.style.cursor = 'grabbing';
}

function onMouseUp(event) {
    event.preventDefault();
    controls.isDragging = false;
    renderer.domElement.style.cursor = 'grab';
}

function onMouseWheel(event) {
    event.preventDefault();
    // Determine zoom direction (in or out)
    const direction = event.deltaY > 0 ? 1 : -1;
    const distanceToCenter = camera.position.length();
    
    // Zoom amount scales with current distance for proportional movement
    const zoomAmount = distanceToCenter * controls.zoomSpeed * direction;

    // Calculate the direction vector the camera is facing
    const vector = new THREE.Vector3(0, 0, -1);
    vector.applyQuaternion(camera.quaternion);
    // Move the camera along that vector
    camera.position.addScaledVector(vector, zoomAmount);

    camera.lookAt(0, 0, 0);
}

function onMouseClick(event) {
    event.preventDefault();
    // Set raycaster origin and direction from the camera position through the mouse point
    raycaster.setFromCamera(mouse, camera);

    // Find intersections with the star mesh
    const intersects = raycaster.intersectObject(Galaxy.starMesh);

    if (intersects.length > 0) {
        const intersect = intersects[0];
        const index = intersect.index; // Index corresponds to the star in the geometry array

        // Retrieve the stored data
        const starData = Galaxy.starMap.get(index);
        
        if (starData) {
            Galaxy.showSystemDetails(starData);
        }
    }
}

// --- TOUCH HANDLERS (Mobile Controls) ---
function onTouchStart(event) {
    event.preventDefault(); // Prevent default browser behavior (like scrolling/zooming)
    
    if (event.touches.length === 1) {
        // Single touch for rotation/drag
        controls.isDragging = true;
        controls.previousMousePosition = { x: event.touches[0].clientX, y: event.touches[0].clientY };
    } else if (event.touches.length === 2) {
        // Two touches for pinch zoom
        const t1 = event.touches[0];
        const t2 = event.touches[1];
        // Calculate the initial distance between the two fingers
        controls.initialTouchDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        controls.isDragging = false; // Disable rotation during pinch
    }
}

function onTouchMove(event) {
    event.preventDefault();
    
    // Handle Rotation (Single Touch)
    if (event.touches.length === 1 && controls.isDragging) {
        const touch = event.touches[0];
        const deltaX = touch.clientX - controls.previousMousePosition.x;
        const deltaY = touch.clientY - controls.previousMousePosition.y;

        // Use the same rotation logic as mouse drag, potentially faster speed for touch feel
        const rotationMatrix = new THREE.Matrix4();
        rotationMatrix.makeRotationX(deltaY * controls.rotationSpeed * 1.5); 
        camera.position.applyMatrix4(rotationMatrix);
        
        rotationMatrix.makeRotationY(deltaX * controls.rotationSpeed * 1.5);
        camera.position.applyMatrix4(rotationMatrix);

        camera.lookAt(0, 0, 0); 
        controls.previousMousePosition = { x: touch.clientX, y: touch.clientY };
    } 
    
    // Handle Zoom (Pinch Gesture - Two Touches)
    if (event.touches.length === 2) {
        const t1 = event.touches[0];
        const t2 = event.touches[1];
        
        const currentDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        
        if (controls.initialTouchDistance) {
            const distanceChange = currentDistance - controls.initialTouchDistance;
            
            const distanceToCenter = camera.position.length();
            // Negative distanceChange (pinch IN) should result in a positive zoomAmount (move camera AWAY)
            // Positive distanceChange (pinch OUT) should result in a negative zoomAmount (move camera CLOSER)
            const zoomAmount = -(distanceChange * controls.zoomSpeed * 0.5); 
            
            const vector = new THREE.Vector3(0, 0, -1);
            vector.applyQuaternion(camera.quaternion);
            camera.position.addScaledVector(vector, zoomAmount); 
            
            camera.lookAt(0, 0, 0);
        }
        // Update the initial distance for the next move event
        controls.initialTouchDistance = currentDistance;
    }
}

function onTouchEnd(event) {
    // Reset control states
    controls.isDragging = false;
    controls.initialTouchDistance = null; 
    
    // Check for a tap/click action (if only one finger was used)
    if (event.changedTouches.length === 1) {
        const touch = event.changedTouches[0];
        
        // Use the coordinates of the released touch for raycasting
        mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(Galaxy.starMesh);

        if (intersects.length > 0) {
            const intersect = intersects[0];
            const index = intersect.index;
            const starData = Galaxy.starMap.get(index);
            if (starData) {
                Galaxy.showSystemDetails(starData);
            }
        }
    }
}


// Raycasting logic to check if mouse/touch is over a star
function checkIntersection() {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(Galaxy.starMesh);

    if (intersects.length > 0) {
        if (INTERSECTED != intersects[0].index) {
            // New star intersected
            INTERSECTED = intersects[0].index;
            renderer.domElement.style.cursor = 'pointer';
        }
    } else {
        if (INTERSECTED !== null) {
            // Intersection cleared
            INTERSECTED = null;
        }
        // Set cursor back to dragging/grabbing state if not moving the camera
        renderer.domElement.style.cursor = controls.isDragging ? 'grabbing' : 'grab';
    }
}

// The main animation loop for continuous rendering
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

// Function to draw the 2D visualization of the selected star system
function drawSystemMap(planets) {
    const canvas = document.getElementById('system-map-canvas');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    
    ctx.clearRect(0, 0, width, height);
    
    const centerX = width / 2;
    const centerY = height / 2;
    const starRadius = 10;
    const maxOrbitalRadius = 50; 

    // Draw the Star at the center
    ctx.beginPath();
    ctx.arc(centerX, centerY, starRadius, 0, 2 * Math.PI);
    ctx.fillStyle = 'yellow';
    ctx.shadowColor = 'rgba(255, 255, 0, 0.5)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0; // Reset shadow

    // Draw Orbits and Planets
    // Find the maximum orbital radius to scale all orbits appropriately within the canvas
    const maxRadius = planets.reduce((max, p) => Math.max(max, p.orbitalRadius), 0);

    planets.forEach((planet, index) => {
        // Scale the orbital radius for display based on the largest radius
        const orbitalScale = (planet.orbitalRadius / maxRadius) * maxOrbitalRadius;

        // Draw Orbit path
        ctx.beginPath();
        ctx.arc(centerX, centerY, orbitalScale + starRadius, 0, 2 * Math.PI);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.stroke();

        // Calculate planet position on the orbit (angle shifts over time for animation effect)
        const angle = index * (Math.PI / 4) + (Date.now() * 0.0001) % (2 * Math.PI); 
        const planetX = centerX + (orbitalScale + starRadius) * Math.cos(angle);
        const planetY = centerY + (orbitalScale + starRadius) * Math.sin(angle);
        
        // Choose color based on planet type
        let planetColor = '#999999';
        switch (planet.type) {
            case 'Terran': planetColor = '#4CAF50'; break;
            case 'Gas Giant': planetColor = '#FF9800'; break;
            case 'Ice World': planetColor = '#81D4FA'; break;
            case 'Jungle World': planetColor = '#689F38'; break;
            case 'Ocean World': planetColor = '#2196F3'; break;
            case 'Desert Planet': planetColor = '#FFC107'; break;
            case 'Barren Rock': planetColor = '#795548'; break;
        }

        // Draw Planet
        ctx.beginPath();
        const planetDisplaySize = Math.max(2, planet.size * 5); 
        ctx.arc(planetX, planetY, planetDisplaySize, 0, 2 * Math.PI);
        ctx.fillStyle = planetColor;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    });
}

// Main function to display system details on the UI panel
Galaxy.showSystemDetails = function (data) {
    document.getElementById('sys-name').textContent = data.systemName;
    document.getElementById('sys-class').textContent = data.starClass;
    
    document.getElementById('sys-species').textContent = data.species;
    document.getElementById('sys-tech').textContent = data.tech;
    document.getElementById('sys-society').textContent = data.society;
    
    document.getElementById('sys-desc').textContent = data.description;

    // --- Planet Lore Population ---
    const planetContainer = document.getElementById('planet-details-container');
    planetContainer.innerHTML = ''; // Clear previous planets

    data.planets.forEach(planet => {
        const card = document.createElement('div');
        card.className = 'planet-card';
        card.innerHTML = `
            <h3>${planet.name} - ${planet.type}</h3>
            <p>${planet.description}</p>
        `;
        planetContainer.appendChild(card);
    });

    // --- System Map Generation ---
    drawSystemMap(data.planets);

    document.getElementById('system-details').style.display = 'block';
};

Galaxy.hideSystemDetails = function () {
    document.getElementById('system-details').style.display = 'none';
};
