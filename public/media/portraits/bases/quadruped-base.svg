        <g id="eyes">
            <circle cx="105" cy="100" r="3" data-fill="eyes" fill="#ff0" />
            <circle cx="115" cy="100" r="3" data-fill="eyes" fill="#ff0" />
            <circle cx="125" cy="100" r="3" data-fill="eyes" fill="#ff0" />
