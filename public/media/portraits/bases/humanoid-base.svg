<svg width="256" height="512" viewBox="0 0 256 512" xmlns="http://www.w.org/2000/svg" id="humanoid-base">
    <!--
        Humanoid Base Figure SVG Template
        - Designed for procedural layering and modification.
        - Groups (<g>) are used for layering body parts, hair, and clothing/armor.
        - Specific paths have IDs for JS manipulation (e.g., #jawline).
        - Elements to be colored have `data-fill` attributes.
        - The viewBox is for the full figure; a portrait can be a "close-up" on the #head group.
    -->
    <defs>
        <!-- Reusable patterns or gradients can be defined here -->
    </defs>

    <!-- Main Body Group -->
    <g id="body">
        <!-- Torso -->
        <path id="torso" d="M 88,180 C 88,220 168,220 168,180 L 160,300 L 96,300 Z" fill="#555" />
        <!-- Arms -->
        <path id="left-arm" d="M 88,180 C 80,250 70,320 75,350 L 85,345 C 80,280 88,210 88,180 Z" data-fill="secondary-skin" fill="#444" />
        <path id="right-arm" d="M 168,180 C 176,250 186,320 181,350 L 171,345 C 176,280 168,210 168,180 Z" data-fill="secondary-skin" fill="#444" />
        <!-- Legs -->
        <path id="left-leg" d="M 96,300 L 90,500 L 120,500 L 120,300 Z" fill="#333" />
        <path id="right-leg" d="M 160,300 L 166,500 L 136,500 L 136,300 Z" fill="#333" />
    </g>

    <!-- Head Group -->
    <g id="head">
        <!-- Base head shape with a modifiable jawline -->
        <path id="headshape" d="M 100,100 C 90,140 100,180 128,180 C 156,180 166,140 156,100 C 150,60 106,60 100,100 Z" data-fill="primary-skin" fill="#8d6e63" />
        <path id="jawline" d="M 100,150 C 110,185 146,185 156,150" fill="none" stroke="#000" stroke-opacity="0.2" stroke-width="1"/>
        
        <!-- Eyes -->
        <g id="eyes">
            <circle cx="115" cy="120" r="5" fill="#fff" />
            <circle cx="141" cy="120" r="5" fill="#fff" />
            <circle cx="115" cy="120" r="2" fill="#000" />
            <circle cx="141" cy="120" r="2" fill="#000" />
        </g>
    </g>

    <!-- Apparel and Hair Layers (hidden by default) -->
    <g id="hair-layers">
        <g id="hair-style-1" style="display: none;">
            <path d="M 100,100 C 90,60 166,60 156,100 L 150,90 C 160,50 90,50 105,90 Z" data-fill="hair" fill="#2d2d2d" />
        </g>
        <g id="hair-style-2" style="display: none;">
            <path d="M 100,100 C 80,80 100,50 128,60 C 156,50 176,80 156,100 Z" data-fill="hair" fill="#6d4c41" />
        </g>
    </g>

    <g id="helmet-layers">
        <g id="helmet-style-1" style="display: none;">
            <path d="M 95,105 C 85,140 95,185 128,185 C 161,185 171,140 161,105 C 155,55 101,55 95,105 Z" data-fill="helmet-primary" fill="#78909c" />
            <path d="M 95,105 C 101,55 155,55 161,105" fill="none" stroke="#000" stroke-opacity="0.3" stroke-width="2" />
            <rect x="105" y="115" width="46" height="15" data-fill="helmet-visor" fill="#26c6da" />
        </g>
    </g>

</svg>