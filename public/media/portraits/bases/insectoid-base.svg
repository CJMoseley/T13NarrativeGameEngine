<svg width="256" height="512" viewBox="0 0 256 512" xmlns="http://www.w3.org/2000/svg" id="insectoid-base">
    <!--
        Insectoid Base Figure SVG Template
        ComfyUI Prompt:
        retro anime style portrait of a wise insectoid alien, multifaceted eyes, slender segmented body, chitinous plates in iridescent green and dark teal, four delicate arms, floating gracefully in a zero-gravity environment, bioluminescent patterns on its carapace, cyberpunk city background with neon signs, ethereal glow, sharp vector lines, limited color palette.
        Negative Prompt:
        human-like, cute, furry, photorealistic, 3d render, blurry, deformed, poorly drawn, text, watermark.
    -->
    <g id="body">
        <path id="neck" d="M 120,190 L 120,160 L 136,160 L 136,190 Z" data-fill="primary-carapace" fill="#4a4a4a" />
        <path id="torso" d="M 128,190 C 100,250 156,250 128,190 L 128,350 Z" data-fill="primary-carapace" fill="#4a4a4a" />
        <path id="upper-arms" d="M 100,220 C 60,180 80,250 100,220 M 156,220 C 196,180 176,250 156,220" fill="none" data-stroke="limbs" stroke="#4a4a4a" stroke-width="8" />
        <path id="lower-arms" d="M 100,260 C 60,220 80,290 100,260 M 156,260 C 196,220 176,290 156,260" fill="none" data-stroke="limbs" stroke="#4a4a4a" stroke-width="8" />
    </g>
    <g id="head">
        <path id="headshape" d="M 110,120 C 90,160 166,160 146,120 C 150,90 106,90 110,120 Z" data-fill="secondary-carapace" fill="#555" />
        <path id="mandibles" d="M 115,150 C 105,180 128,170 128,150 M 141,150 C 151,180 128,170 128,150" fill="none" data-stroke="mandibles" stroke="#555" stroke-width="5" />
        <g id="eyes">
            <path id="left-eye" d="M 105,115 C 95,140 120,140 120,115 Z" data-fill="eyes" fill="#222" />
            <path id="right-eye" d="M 151,115 C 161,140 136,140 136,115 Z" data-fill="eyes" fill="#222" />
        </g>
    </g>
</svg>